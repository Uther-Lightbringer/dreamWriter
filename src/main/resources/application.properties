# 책쨘혬챌혬짢챌짢혢책쨘혧챕혚혥챌쩍짰
server.port=38081
spring.application.name=article-collect

# H2챈혯혝채쨩쨋챈혮째챈혥짰책쨘혫챕혚혥챌쩍짰챦쩌혞챈째쨍채쨔혚책짯혱책혗짢챦쩌혟
spring.datasource.url=jdbc:h2:file:./data/article_collect;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate챕혚혥챌쩍짰
spring.jpa.database=h2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2챈혦짠책혞쨋책혧째챦쩌혞챈혯쨔채쩐쩔챔째혘챔짱혮챦쩌혟
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 챈혮째챈혥짰책쨘혫챔쩔혷챈혦짜챈짹혻챕혚혥챌쩍짰
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# Thymeleaf챕혚혥챌쩍짰
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML