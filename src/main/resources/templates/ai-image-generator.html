<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境画坊 · AI 图片生成</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dream-pink: #fce4ec;
            --dream-lavender: #e8eaf6;
            --dream-mint: #e0f7fa;
            --dream-peach: #fff3e0;
            --accent-purple: #9c27b0;
            --accent-blue: #3f51b5;
            --accent-teal: #009688;
            --text-dark: #5d4037;
            --text-light: #8d6e63;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dream-pink) 0%, var(--dream-lavender) 25%, var(--dream-mint) 50%, var(--dream-peach) 75%, var(--dream-pink) 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        /* 梦幻气泡背景 */
        .floating-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ffb3d9, transparent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #b3d9ff, transparent);
            top: 30%;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #b3ffe0, transparent);
            bottom: -50px;
            left: 30%;
            animation-delay: -10s;
        }

        .orb-4 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #ffe0b3, transparent);
            bottom: 20%;
            right: 20%;
            animation-delay: -7s;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* 主容器 - 玻璃态设计 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* 头部设计 */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(156, 39, 176, 0.3);
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 3px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 12px 28px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(-5px);
            box-shadow: 0 8px 32px rgba(156, 39, 176, 0.15);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 玻璃卡片通用样式 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 40px;
            margin-bottom: 30px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .section-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(156, 39, 176, 0.3), transparent);
        }

        .section-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 28px;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .dream-input,
        .dream-textarea {
            width: 100%;
            padding: 18px 24px;
            border: 2px solid transparent;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--text-dark);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .dream-textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.8;
        }

        .dream-input:focus,
        .dream-textarea:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 6px rgba(156, 39, 176, 0.1), 0 8px 24px rgba(156, 39, 176, 0.15);
            background: rgba(255, 255, 255, 0.95);
        }

        .char-count {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 8px;
            opacity: 0.7;
        }

        /* 按钮样式 */
        .dream-btn {
            padding: 16px 42px;
            border: none;
            border-radius: 50px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .dream-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .dream-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .dream-btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            box-shadow: 0 8px 25px rgba(156, 39, 176, 0.4);
        }

        .dream-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(156, 39, 176, 0.5);
        }

        .dream-btn-secondary {
            background: linear-gradient(135deg, var(--accent-teal), #4db6ac);
            color: white;
            box-shadow: 0 8px 25px rgba(0, 150, 136, 0.4);
        }

        .dream-btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 150, 136, 0.5);
        }

        .dream-btn-ghost {
            background: transparent;
            border: 2px solid var(--accent-purple);
            color: var(--accent-purple);
        }

        .dream-btn-ghost:hover {
            background: var(--accent-purple);
            color: white;
            transform: translateY(-2px);
        }

        .dream-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* 尺寸选择器 */
        .size-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .size-option {
            padding: 20px 15px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .size-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.1), rgba(63, 81, 181, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .size-option:hover {
            transform: translateY(-3px);
            border-color: rgba(156, 39, 176, 0.3);
        }

        .size-option:hover::before {
            opacity: 1;
        }

        .size-option.selected {
            border-color: var(--accent-purple);
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.15), rgba(63, 81, 181, 0.15));
            box-shadow: 0 8px 25px rgba(156, 39, 176, 0.2);
        }

        .size-ratio {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .size-name {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* 加载动画 */
        .loading-container {
            display: none;
            text-align: center;
            padding: 50px 20px;
        }

        .dream-spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            position: relative;
        }

        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .spinner-ring:nth-child(1) {
            border-top-color: var(--accent-purple);
            animation-delay: 0s;
        }

        .spinner-ring:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 10px;
            left: 10px;
            border-right-color: var(--accent-blue);
            animation-delay: 0.15s;
            animation-direction: reverse;
        }

        .spinner-ring:nth-child(3) {
            width: 40px;
            height: 40px;
            top: 20px;
            left: 20px;
            border-bottom-color: var(--accent-teal);
            animation-delay: 0.3s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-light);
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .progress-container {
            margin-top: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-bar {
            height: 6px;
            background: rgba(156, 39, 176, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            margin-top: 10px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* 图片结果 */
        .image-result {
            display: none;
            margin-top: 30px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-image-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        .result-image {
            width: 100%;
            display: block;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .result-image-wrapper:hover .result-image {
            transform: scale(1.02);
        }

        .result-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        /* 提示框 */
        .alert {
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.4s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-error {
            background: rgba(255, 235, 238, 0.8);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #c62828;
        }

        .alert-success {
            background: rgba(232, 245, 233, 0.8);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #2e7d32;
        }

        /* 历史记录 */
        .history-section {
            margin-top: 50px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .history-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .history-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .history-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .history-info {
            padding: 20px;
        }

        .history-prompt {
            font-size: 0.9rem;
            color: var(--text-dark);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .history-date {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .empty-history {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 两栏布局 */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
                letter-spacing: 4px;
            }

            .glass-card {
                padding: 25px;
            }

            .section-title {
                font-size: 1.4rem;
            }

            .size-selector {
                grid-template-columns: repeat(2, 1fr);
            }

            .history-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px 15px;
            }
        }

        /* 全屏查看 */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fullscreen-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(156, 39, 176, 0.3);
        }

        /* 输出框标签 */
        .result-box {
            position: relative;
            margin-top: 20px;
        }

        .result-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 1;
        }

        /* 分隔线装饰 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(156, 39, 176, 0.3), transparent);
            margin: 40px 0;
        }

        /* 角色选择器样式 */
        .character-selector {
            margin-bottom: 28px;
        }

        .novel-select-wrapper {
            margin-bottom: 16px;
        }

        .dream-select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid transparent;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--text-dark);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            cursor: pointer;
        }

        .dream-select:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 6px rgba(156, 39, 176, 0.1);
            background: rgba(255, 255, 255, 0.95);
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            padding: 8px 4px;
        }

        .character-grid::-webkit-scrollbar {
            width: 6px;
        }

        .character-grid::-webkit-scrollbar-track {
            background: rgba(156, 39, 176, 0.1);
            border-radius: 3px;
        }

        .character-grid::-webkit-scrollbar-thumb {
            background: rgba(156, 39, 176, 0.3);
            border-radius: 3px;
        }

        .character-card-item {
            position: relative;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .character-card-item:hover {
            transform: translateY(-3px);
            border-color: rgba(156, 39, 176, 0.3);
            box-shadow: 0 8px 20px rgba(156, 39, 176, 0.15);
        }

        .character-card-item.selected {
            border-color: var(--accent-purple);
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.15), rgba(63, 81, 181, 0.15));
            box-shadow: 0 8px 25px rgba(156, 39, 176, 0.2);
        }

        .character-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, var(--dream-lavender), var(--dream-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow: hidden;
        }

        .character-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-name {
            font-size: 0.9rem;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .character-info {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .character-checkbox {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--accent-purple);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--accent-purple);
        }

        .character-card-item.selected .character-checkbox {
            display: flex;
            background: var(--accent-purple);
            color: white;
        }

        .selected-characters-summary {
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(156, 39, 176, 0.08);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-dark);
        }

        .selected-characters-summary strong {
            color: var(--accent-purple);
        }

        .empty-characters {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* 世界观选项 */
        .worldview-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(0, 150, 136, 0.08);
            border-radius: 12px;
        }

        .worldview-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-teal);
        }

        .worldview-label {
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
            user-select: none;
        }

        .worldview-hint {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* 故事生成区域 */
        .story-box {
            position: relative;
            margin-top: 20px;
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }

        .story-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: linear-gradient(135deg, var(--accent-teal), #4db6ac);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 1;
        }

        .story-textarea {
            width: 100%;
            min-height: 160px;
            padding: 30px 24px 24px;
            border: 2px solid transparent;
            border-radius: 16px;
            background: rgba(224, 247, 250, 0.5);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            line-height: 1.9;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            resize: vertical;
        }

        .story-textarea:focus {
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 6px rgba(0, 150, 136, 0.1);
            background: rgba(224, 247, 250, 0.7);
        }

        .generating-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .generating-dots {
            display: flex;
            gap: 4px;
        }

        .generating-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent-teal);
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out;
        }

        .generating-dots span:nth-child(1) { animation-delay: 0s; }
        .generating-dots span:nth-child(2) { animation-delay: 0.2s; }
        .generating-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 梦幻背景装饰 -->
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>梦境画坊</h1>
            <p class="subtitle">将文字化为艺术，让梦境触手可及</p>
            <a href="/" class="back-link">
                <span>←</span>
                <span>返回首页</span>
            </a>
        </header>

        <!-- 两栏主内容 -->
        <div class="two-column">
            <!-- 左侧：提示词生成 -->
            <div class="glass-card">
                <h2 class="section-title">
                    <span class="section-icon">✨</span>
                    <span>灵感咒语</span>
                </h2>

                <!-- 角色卡选择器 -->
                <div class="character-selector">
                    <label class="form-label">选择角色（可选）</label>
                    <div class="novel-select-wrapper">
                        <select id="novelSelect" class="dream-select" onchange="loadCharactersForNovel()">
                            <option value="">-- 请先选择小说 --</option>
                        </select>
                    </div>
                    <div id="characterGrid" class="character-grid" style="display: none;">
                        <!-- 角色卡将在这里动态加载 -->
                    </div>
                    <div id="emptyCharacters" class="empty-characters" style="display: none;">
                        这本小说还没有创建角色卡
                    </div>
                    <div id="selectedCharactersSummary" class="selected-characters-summary" style="display: none;">
                        已选择：<strong id="selectedCount">0</strong> 个角色
                    </div>

                    <!-- 世界观选项 -->
                    <div id="worldviewOption" class="worldview-option" style="display: none;">
                        <input type="checkbox" id="includeWorldview" class="worldview-checkbox" checked>
                        <label for="includeWorldview" class="worldview-label">
                            包含世界观设定
                        </label>
                    </div>
                    <div id="worldviewHint" class="worldview-hint" style="display: none;">
                        💡 选择多个角色时，会自动结合他们的背景故事和关系
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">输入您的关键词</label>
                    <textarea
                        id="keywordInput"
                        class="dream-textarea"
                        placeholder="例如：古装女子、桃花树、月光、唯美..."></textarea>
                </div>

                <button class="dream-btn dream-btn-primary" onclick="generatePrompt()" id="generatePromptBtn">
                    <span>🌸</span>
                    <span>编织梦境</span>
                </button>

                <!-- 提示词加载 -->
                <div class="loading-container" id="promptLoading">
                    <div class="dream-spinner">
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                    </div>
                    <p class="loading-text">正在唤醒灵感...</p>
                </div>

                <!-- 故事生成区域 -->
                <div class="story-box" id="storyBox">
                    <span class="story-label">梦境脚本</span>
                    <div id="storyGenerating" class="generating-indicator" style="display: none;">
                        <div class="generating-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <span>正在创作梦境脚本...</span>
                    </div>
                    <textarea
                        id="generatedStory"
                        class="story-textarea"
                        placeholder="AI 生成的故事将在这里显示..."
                        style="display: none;"></textarea>
                </div>

                <div class="result-box" style="margin-top: 30px;">
                    <span class="result-label">AI 生成</span>
                    <textarea
                        id="generatedPrompt"
                        class="dream-textarea"
                        readonly
                        placeholder="点击上方按钮后，这里将呈现 AI 为您编织的梦境咒语..."
                        style="padding-top: 30px;"></textarea>
                </div>

                <div class="btn-group" id="usePromptGroup" style="display: none;">
                    <button class="dream-btn dream-btn-secondary" onclick="useGeneratedPrompt()">
                        <span>💫</span>
                        <span>用于作画</span>
                    </button>
                </div>

                <div class="alert alert-error" id="promptError"></div>
            </div>

            <!-- 右侧：图片生成 -->
            <div class="glass-card">
                <h2 class="section-title">
                    <span class="section-icon">🎨</span>
                    <span>绘梦成真</span>
                </h2>

                <div class="form-group">
                    <label class="form-label">梦境描述</label>
                    <textarea
                        id="imagePrompt"
                        class="dream-textarea"
                        placeholder="描述您想要的画面..."
                        rows="4"
                        oninput="updateCharacterCount('imagePrompt', 'imagePromptCount')"></textarea>
                    <div class="char-count" id="imagePromptCount">0/2000</div>
                </div>

                <div class="form-group">
                    <label class="form-label">画幅比例</label>
                    <div class="size-selector">
                        <div class="size-option" data-size="16:9" onclick="selectSize(this)">
                            <div class="size-ratio">16:9</div>
                            <div class="size-name">宽屏梦境</div>
                        </div>
                        <div class="size-option" data-size="3:4" onclick="selectSize(this)">
                            <div class="size-ratio">3:4</div>
                            <div class="size-name">竖幅画卷</div>
                        </div>
                        <div class="size-option" data-size="1:1" onclick="selectSize(this)">
                            <div class="size-ratio">1:1</div>
                            <div class="size-name">方圆之间</div>
                        </div>
                        <div class="size-option selected" data-size="9:16" onclick="selectSize(this)">
                            <div class="size-ratio">9:16</div>
                            <div class="size-name">手机画幅</div>
                        </div>
                        <div class="size-option" data-size="4:3" onclick="selectSize(this)">
                            <div class="size-ratio">4:3</div>
                            <div class="size-name">经典比例</div>
                        </div>
                        <div class="size-option" data-size="2:3" onclick="selectSize(this)">
                            <div class="size-ratio">2:3</div>
                            <div class="size-name">人像特写</div>
                        </div>
                    </div>
                </div>

                <button class="dream-btn dream-btn-secondary" onclick="generateImage()" id="generateImageBtn">
                    <span>🌙</span>
                    <span>开始绘梦</span>
                </button>

                <!-- 图片加载 -->
                <div class="loading-container" id="imageLoading">
                    <div class="dream-spinner">
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                    </div>
                    <p class="loading-text">画师正在精心绘制...</p>
                    <div class="progress-container" id="progressContainer" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p class="progress-text" id="progressText">进度：0%</p>
                    </div>
                </div>

                <!-- 图片结果 -->
                <div class="image-result" id="imageResult">
                    <div class="result-image-wrapper" onclick="viewImageFullscreen()">
                        <img id="generatedImage" class="result-image" src="" alt="梦境画作">
                    </div>
                    <div class="result-actions">
                        <button class="dream-btn dream-btn-ghost" onclick="downloadImage()">
                            <span>⬇️</span>
                            <span>珍藏画作</span>
                        </button>
                        <button class="dream-btn dream-btn-primary" onclick="regenerateImage()" id="regenerateBtn">
                            <span>🔄</span>
                            <span>再绘一梦</span>
                        </button>
                    </div>
                </div>

                <div class="alert alert-error" id="imageError"></div>
                <div class="alert alert-success" id="imageSuccess"></div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="glass-card history-section">
            <div class="history-header">
                <h2 class="section-title">
                    <span class="section-icon">📜</span>
                    <span>梦境画廊</span>
                </h2>
                <button class="dream-btn dream-btn-ghost" onclick="loadHistory()" style="padding: 12px 28px;">
                    <span>🔄</span>
                    <span>刷新画廊</span>
                </button>
            </div>

            <div class="history-grid" id="historyGrid">
                <div class="empty-history" id="emptyHistory">
                    <div class="empty-icon">🖼️</div>
                    <p>画廊空空如也</p>
                    <p style="font-size: 0.95rem; margin-top: 10px; opacity: 0.7;">开始创作您的第一幅梦境画作吧</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let pollInterval = null;
        let selectedSize = '9:16';
        let isGenerating = false;
        let allNovelsData = [];
        let selectedCharacterCards = new Map(); // key: characterId, value: characterCard
        let currentSelectedNovel = null; // 当前选中的小说数据

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadHistory();
            updateCharacterCount('imagePrompt', 'imagePromptCount');
            loadAllNovelsWithCharacterCards();
        });

        // 加载所有小说及其角色卡
        async function loadAllNovelsWithCharacterCards() {
            try {
                const response = await fetch('/api/novels-with-character-cards');
                if (!response.ok) throw new Error('加载数据失败');

                const result = await response.json();
                if (result.success && result.data) {
                    allNovelsData = result.data;
                    populateNovelSelect();
                }
            } catch (error) {
                console.error('加载小说和角色卡失败:', error);
            }
        }

        // 填充小说选择下拉框
        function populateNovelSelect() {
            const novelSelect = document.getElementById('novelSelect');
            novelSelect.innerHTML = '<option value="">-- 请选择小说 --</option>';

            allNovelsData.forEach(item => {
                const novel = item.novel;
                const characterCount = item.characterCards ? item.characterCards.length : 0;
                const option = document.createElement('option');
                option.value = novel.id;
                option.textContent = `${novel.title} (${characterCount}个角色)`;
                novelSelect.appendChild(option);
            });
        }

        // 加载选中小说的角色卡
        function loadCharactersForNovel() {
            const novelId = document.getElementById('novelSelect').value;
            const characterGrid = document.getElementById('characterGrid');
            const emptyCharacters = document.getElementById('emptyCharacters');
            const worldviewOption = document.getElementById('worldviewOption');
            const worldviewHint = document.getElementById('worldviewHint');

            // 清空之前的选择
            selectedCharacterCards.clear();
            currentSelectedNovel = null;

            if (!novelId) {
                characterGrid.style.display = 'none';
                emptyCharacters.style.display = 'none';
                worldviewOption.style.display = 'none';
                worldviewHint.style.display = 'none';
                updateSelectedSummary();
                return;
            }

            const novelData = allNovelsData.find(item => item.novel.id == novelId);
            currentSelectedNovel = novelData ? novelData.novel : null;
            const characters = novelData ? novelData.characterCards : [];

            // 显示世界观选项（如果小说有世界观）
            if (currentSelectedNovel && currentSelectedNovel.worldView) {
                worldviewOption.style.display = 'flex';
            } else {
                worldviewOption.style.display = 'none';
            }
            worldviewHint.style.display = 'block';

            if (!characters || characters.length === 0) {
                characterGrid.style.display = 'none';
                emptyCharacters.style.display = 'block';
                updateSelectedSummary();
                return;
            }

            emptyCharacters.style.display = 'none';
            characterGrid.style.display = 'grid';
            characterGrid.innerHTML = '';

            characters.forEach(character => {
                const card = createCharacterCardElement(character);
                characterGrid.appendChild(card);
            });

            updateSelectedSummary();
        }

        // 创建角色卡元素
        function createCharacterCardElement(character) {
            const div = document.createElement('div');
            div.className = 'character-card-item';
            div.dataset.characterId = character.id;

            if (selectedCharacterCards.has(character.id)) {
                div.classList.add('selected');
            }

            div.onclick = () => toggleCharacterSelection(character, div);

            const avatar = document.createElement('div');
            avatar.className = 'character-avatar';
            if (character.generatedImageUrl) {
                const img = document.createElement('img');
                img.src = character.generatedImageUrl;
                img.alt = character.name;
                avatar.appendChild(img);
            } else {
                avatar.textContent = character.name ? character.name.charAt(0) : '?';
            }

            const checkbox = document.createElement('div');
            checkbox.className = 'character-checkbox';
            checkbox.textContent = '✓';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'character-name';
            nameDiv.textContent = character.name || '未知角色';

            const infoDiv = document.createElement('div');
            infoDiv.className = 'character-info';
            let infoText = [];
            if (character.gender) infoText.push(character.gender);
            if (character.age) infoText.push(character.age + '岁');
            if (character.occupation) infoText.push(character.occupation);
            infoDiv.textContent = infoText.join(' · ');

            div.appendChild(checkbox);
            div.appendChild(avatar);
            div.appendChild(nameDiv);
            div.appendChild(infoDiv);

            return div;
        }

        // 切换角色选择状态
        function toggleCharacterSelection(character, element) {
            const characterId = character.id;

            if (selectedCharacterCards.has(characterId)) {
                selectedCharacterCards.delete(characterId);
                element.classList.remove('selected');
            } else {
                selectedCharacterCards.set(characterId, character);
                element.classList.add('selected');
            }

            updateSelectedSummary();
        }

        // 更新已选角色摘要
        function updateSelectedSummary() {
            const summary = document.getElementById('selectedCharactersSummary');
            const countSpan = document.getElementById('selectedCount');
            const count = selectedCharacterCards.size;

            if (count > 0) {
                summary.style.display = 'block';
                countSpan.textContent = count;

                const names = Array.from(selectedCharacterCards.values())
                    .map(c => c.name)
                    .join('、');
                summary.title = names;
            } else {
                summary.style.display = 'none';
            }
        }

        // 更新字数显示
        function updateCharacterCount(textareaId, countId) {
            const textarea = document.getElementById(textareaId);
            const countDiv = document.getElementById(countId);
            if (textarea && countDiv) {
                const length = textarea.value.length;
                countDiv.textContent = length + '/2000';
                if (length > 2000) {
                    countDiv.style.color = '#c62828';
                    countDiv.style.fontWeight = '600';
                } else if (length > 1800) {
                    countDiv.style.color = '#f57c00';
                    countDiv.style.fontWeight = '600';
                } else {
                    countDiv.style.color = 'var(--text-light)';
                    countDiv.style.fontWeight = 'normal';
                }
            }
        }

        // 选择尺寸
        function selectSize(element) {
            document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedSize = element.getAttribute('data-size');
        }

        // 调用AI聊天API的辅助函数
        async function callAIChat(prompt) {
            const response = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            if (!response.ok) throw new Error('AI请求失败');
            const result = await response.json();
            return result.response || result.content || result.message || '';
        }

        // 生成提示词
        async function generatePrompt() {
            const keyword = document.getElementById('keywordInput').value.trim();
            const hasCharacters = selectedCharacterCards.size > 0;
            const characterCount = selectedCharacterCards.size;
            const includeWorldview = document.getElementById('includeWorldview')?.checked ?? true;
            const shouldUseTwoStepProcess = characterCount >= 2 && includeWorldview && currentSelectedNovel && currentSelectedNovel.worldView;

            if (!keyword && !hasCharacters) {
                showAlert('promptError', '请输入关键词或选择角色，让灵感开始流动 ✨');
                return;
            }

            hideAlert('promptError');
            const btn = document.getElementById('generatePromptBtn');
            btn.disabled = true;
            document.getElementById('promptLoading').style.display = 'block';
            document.getElementById('generatedPrompt').value = '';
            document.getElementById('usePromptGroup').style.display = 'none';

            // 重置故事区域
            const storyBox = document.getElementById('storyBox');
            const storyGenerating = document.getElementById('storyGenerating');
            const generatedStory = document.getElementById('generatedStory');
            storyBox.style.display = 'none';
            storyGenerating.style.display = 'none';
            generatedStory.style.display = 'none';
            generatedStory.value = '';

            try {
                // 构建角色描述（包含背景和关系）
                let characterDescription = '';
                let relationshipDescription = '';
                let worldViewDescription = '';
                let charactersInfo = [];

                if (hasCharacters) {
                    const characters = Array.from(selectedCharacterCards.values());
                    charactersInfo = characters;

                    // 构建每个角色的详细描述
                    characterDescription = characters.map(char => {
                        let desc = `Name: ${char.name || 'Unknown'}`;
                        if (char.gender) desc += `, Gender: ${char.gender}`;
                        if (char.age) desc += `, Age: ${char.age}`;
                        if (char.occupation) desc += `, Occupation: ${char.occupation}`;
                        if (char.appearanceDescription) desc += `, Appearance: ${char.appearanceDescription}`;
                        if (char.personality) desc += `, Personality: ${char.personality}`;
                        if (char.background) desc += `, Background: ${char.background}`;
                        return `{${desc}}`;
                    }).join('; ');

                    // 提取角色间的关系
                    if (characterCount >= 2) {
                        const relationships = [];
                        characters.forEach(char => {
                            if (char.relationships && char.relationships.length > 0) {
                                char.relationships.forEach(rel => {
                                    const otherCharName = rel.targetName || rel.targetCharacterName;
                                    const otherCharSelected = characters.some(c =>
                                        c.name === otherCharName ||
                                        (c.alternativeNames && c.alternativeNames.includes(otherCharName))
                                    );
                                    if (otherCharSelected && otherCharName) {
                                        relationships.push(`${char.name} and ${otherCharName}: ${rel.relationshipType || rel.type} - ${rel.description || rel.details || ''}`);
                                    }
                                });
                            }
                        });
                        if (relationships.length > 0) {
                            relationshipDescription = relationships.join('; ');
                        }
                    }

                    // 添加世界观
                    if (includeWorldview && currentSelectedNovel && currentSelectedNovel.worldView) {
                        worldViewDescription = currentSelectedNovel.worldView;
                    }
                }

                let finalPromptInput = '';

                // 两步处理：先生成故事，再生成提示词（仅当多个角色+世界观时）
                if (shouldUseTwoStepProcess) {
                    storyBox.style.display = 'block';
                    storyGenerating.style.display = 'flex';

                    // 第一步：生成故事
                    const storyPrompt = `# Role: Story Visual Scene Writer

## Task
Write a vivid, cinematic scene (150-250 words) featuring the characters below. The scene should be highly visual and descriptive, focusing on:

1. **FACIAL FEATURES & EXPRESSIONS**: Detailed descriptions of each character's face, eyes, micro-expressions
2. **BODY LANGUAGE & ACTIONS**: How they move, gesture, touch, posture, physical interaction
3. **EMOTIONAL DYNAMICS**: The tension, warmth, or emotion between them shown through action
4. **VISUAL DETAILS**: Clothing textures, environment, lighting, atmosphere

## World Setting
${worldViewDescription}

## Characters
${characterDescription}

## Character Relationships
${relationshipDescription || 'No specific relationship defined'}

## Scene Context
${keyword || 'Create an meaningful interaction between these characters'}

## Requirements
- Write in CHINESE
- Focus on what can be SEEN in a painting - actions, expressions, environments
- Include detailed facial descriptions for each character
- Show their relationship through actions and body language, not just telling
- 150-250 words, vivid and cinematic

【Important】Only output the scene story, no explanations.`;

                    const story = await callAIChat(storyPrompt);
                    storyGenerating.style.display = 'none';
                    generatedStory.style.display = 'block';
                    generatedStory.value = story;
                    finalPromptInput = story;
                } else {
                    // 单步处理：直接构建提示词输入
                    let fullPromptParts = [];
                    if (keyword) fullPromptParts.push(keyword);
                    if (hasCharacters) fullPromptParts.push(`featuring characters: ${characterDescription}`);
                    if (relationshipDescription) fullPromptParts.push(`[Relationships: ${relationshipDescription}]`);
                    if (worldViewDescription) fullPromptParts.push(`[World: ${worldViewDescription}]`);
                    finalPromptInput = fullPromptParts.join(', ');
                }

                // 最后一步：生成AI绘画提示词
                let systemPrompt = '';

                if (shouldUseTwoStepProcess) {
                    systemPrompt = `# Role: Master Cinematic Art Director

## Task
Transform this scene description into an exceptional AI image generation prompt in ENGLISH.

## Scene Description
${finalPromptInput}

## Your Output Should Include:
1. **Composition & Shot**: What camera angle, shot type (wide/medium/close-up/two-shot)
2. **Characters**: Full appearance descriptions, facial expressions, poses, clothing

        // 使用生成的提示词
        function useGeneratedPrompt() {
            const generatedPrompt = document.getElementById('generatedPrompt').value.trim();

                showAlert('imageError', '提示词为空，无法使用！');

        // 生成图片
        async function generateImage() {
            const prompt = document.getElementById('imagePrompt').value.trim();
            if (!prompt) {
                showAlert('imageError', '请描述您的梦境 🎨');
                return;
            }

            if (isGenerating) {
                showAlert('imageError', '⏳ 画师正在创作中，请耐心等待...');
                return;
            }

            hideAlert('imageError');
            hideAlert('imageSuccess');
            isGenerating = true;
            updateGenerateButtonState();

            document.getElementById('imageResult').style.display = 'none';
            document.getElementById('imageLoading').style.display = 'block';
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '进度：0%';

            try {
                const response = await fetch('/api/image/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        size: selectedSize
                    })
                });

                if (!response.ok) throw new Error('创建任务失败');

                const result = await response.json();
                if (result.success && result.taskId) {
                    currentTaskId = result.taskId;
                    pollTaskStatus();
                } else {
                    throw new Error(result.error || '创建任务失败');
                }

            } catch (error) {
                showAlert('imageError', '绘梦失败：' + error.message);
                isGenerating = false;
                updateGenerateButtonState();
                document.getElementById('imageLoading').style.display = 'none';
            }
        }

        // 轮询任务状态
        async function pollTaskStatus() {
            if (!currentTaskId) return;

            try {
                const response = await fetch(`/api/image/status/${currentTaskId}`);
                if (!response.ok) throw new Error('查询状态失败');

                const result = await response.json();

                if (result.success) {
                    const progress = result.progress || 0;
                    document.getElementById('progressFill').style.width = progress + '%';
                    document.getElementById('progressText').textContent = `进度：${progress}%`;

                    if (result.status === 'completed' && result.imageUrl) {
                        clearInterval(pollInterval);
                        isGenerating = false;
                        updateGenerateButtonState();
                        showGeneratedImage(result.imageUrl);
                        await saveToHistory(document.getElementById('imagePrompt').value, result.imageUrl);
                    } else if (result.status === 'failed') {
                        clearInterval(pollInterval);
                        isGenerating = false;
                        updateGenerateButtonState();
                        showAlert('imageError', result.error || '画作未能完成');
                        document.getElementById('imageLoading').style.display = 'none';
                    }
                }

            } catch (error) {
                console.error('轮询失败:', error);
            }

            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(pollTaskStatus, 2000);
        }

        // 显示生成的图片
        function showGeneratedImage(imageUrl) {
            document.getElementById('generatedImage').src = imageUrl;
            document.getElementById('imageResult').style.display = 'block';
            document.getElementById('imageLoading').style.display = 'none';
            updateGenerateButtonState();
            showAlert('imageSuccess', '✨ 梦境画作已完成！');

            link.download = 'dream_art_' + Date.now() + '.png';

            link.click();
            document.body.removeChild(link);

        // 全屏查看
        function viewImageFullscreen() {
            const imageUrl = document.getElementById('generatedImage').src;
            if (!imageUrl) return;

            const fullscreenDiv = document.createElement('div');
            fullscreenDiv.className = 'fullscreen-overlay';
            fullscreenDiv.onclick = function() {
                document.body.removeChild(fullscreenDiv);
            };

            const img = document.createElement('img');
            img.src = imageUrl;
            img.className = 'fullscreen-image';

            fullscreenDiv.appendChild(img);
            document.body.appendChild(fullscreenDiv);

            const escHandler = function(e) {
                if (e.key === 'Escape') {
                    document.body.removeChild(fullscreenDiv);
                    document.removeEventListener('keydown', escHandler);
                }

            document.addEventListener('keydown', escHandler);

        // 保存历史记录
        async function saveToHistory(prompt, imageUrl) {
            try {
                const response = await fetch('/api/image/history');
                if (response.ok) {
                    const history = await response.json();
                    const exists = history.some(item => item.imageUrl === imageUrl);
                    if (exists) return;
                }

                await fetch('/api/image/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, imageUrl: imageUrl })
                });
            } catch (error) {
                console.error('保存历史失败:', error);
            }
        }

        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch('/api/image/history');
                if (!response.ok) throw new Error('加载失败');

                const history = await response.json();
                const historyGrid = document.getElementById('historyGrid');

                if (history.length === 0) {
                    historyGrid.innerHTML = '<div class="empty-history" id="emptyHistory"><div class="empty-icon">🖼️</div><p>画廊空空如也</p><p style="font-size: 0.95rem; margin-top: 10px; opacity: 0.7;">开始创作您的第一幅梦境画作吧</p></div>';
                    return;
                }

                const uniqueMap = new Map();
                history.forEach(item => {
                    if (!uniqueMap.has(item.imageUrl)) {
                        uniqueMap.set(item.imageUrl, item);
                    }
                });

                const uniqueHistory = Array.from(uniqueMap.values());
                uniqueHistory.sort((a, b) => new Date(b.createTime) - new Date(a.createTime));

                let html = '';
                uniqueHistory.forEach(item => {
                    const date = new Date(item.createTime).toLocaleString('zh-CN');
                    html += `
                        <div class="history-card" onclick="viewHistoryImage('${item.imageUrl}')">
                            <img src="${item.imageUrl}" alt="梦境画作" class="history-image">
                            <div class="history-info">
                                <div class="history-prompt">${escapeHtml(item.prompt)}</div>
                                <div class="history-date">🕐 ${date}</div>
                            </div>
                        </div>
                    `;
                });

                historyGrid.innerHTML = html;

            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        // 查看历史图片
        function viewHistoryImage(imageUrl) {
            const fullscreenDiv = document.createElement('div');
            fullscreenDiv.className = 'fullscreen-overlay';
            fullscreenDiv.onclick = function() {
                document.body.removeChild(fullscreenDiv);
            };

            const img = document.createElement('img');
            img.src = imageUrl;
            img.className = 'fullscreen-image';

            fullscreenDiv.appendChild(img);
            document.body.appendChild(fullscreenDiv);

            const escHandler = function(e) {
                if (e.key === 'Escape') {
                    document.body.removeChild(fullscreenDiv);
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
        }

        // 显示提示
        function showAlert(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }

        // 隐藏提示
        function hideAlert(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
