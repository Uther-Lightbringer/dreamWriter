<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 图片生成 - 小说收藏系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background-color: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background-color: rgba(255,255,255,0.3);
        }
        
        .content {
            padding: 40px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        
        /* 提示词生成区域 */
        .prompt-generator {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        
        .form-group textarea,
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        
        .form-group textarea:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .result-box {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            min-height: 80px;
            position: relative;
        }
        
        .result-box-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: #667eea;
            color: white;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 图片生成区域 */
        .image-generator {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
        }
        
        .size-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .size-option {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .size-option:hover {
            border-color: #667eea;
            background: #f0f0f0;
        }
        
        .size-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            font-weight: 600;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .image-result {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .generated-image {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        
        .generated-image:hover {
            transform: scale(1.02);
        }
        
        .image-actions {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        /* 历史记录区域 */
        .history-section {
            margin-top: 50px;
        }
        
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .history-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .history-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .history-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .history-info {
            padding: 15px;
        }
        
        .history-prompt {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .history-date {
            font-size: 12px;
            color: #999;
        }
        
        .empty-history {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .alert-success {
            background-color: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .history-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI 图片生成</h1>
            <p>输入关键词，让 AI 为你生成精美的图片提示词并创作图片</p>
            <a href="/" class="back-btn">← 返回首页</a>
        </div>
        
        <div class="content">
            <!-- 提示词生成区域 -->
            <div class="section">
                <h2 class="section-title">AI 提示词生成</h2>
                <div class="prompt-generator">
                    <div class="form-group">
                        <label for="keywordInput">📝 输入关键词：</label>
                        <textarea id="keywordInput" placeholder="请输入关键词，例如：古装女子、桃花树、月光、唯美..."></textarea>
                    </div>
                    
                    <button class="btn btn-primary" onclick="generatePrompt()" id="generatePromptBtn">
                        ✨ 生成 AI 提示词
                    </button>
                    
                    <div class="loading" id="promptLoading">
                        <div class="spinner"></div>
                        <p>正在生成提示词...</p>
                    </div>
                    
                    <div class="form-group" style="margin-top: 20px;">
                        <label for="generatedPrompt">🎯 生成的提示词：</label>
                        <div class="result-box">
                            <span class="result-box-label">AI 生成</span>
                            <textarea id="generatedPrompt" readonly placeholder="点击“生成 AI 提示词”按钮后，这里会显示生成的详细提示词..."></textarea>
                        </div>
                        <button class="btn btn-success" onclick="useGeneratedPrompt()" id="usePromptBtn" style="display: none; margin-top: 15px; width: 100%;">
                            ✅ 使用此提示词到下方输入框
                        </button>
                    </div>
                    
                    <div class="alert alert-error" id="promptError"></div>
                </div>
            </div>
            
            <!-- 图片生成区域 -->
            <div class="section">
                <h2 class="section-title">AI 图片生成</h2>
                <div class="image-generator">
                    <div class="form-group">
                        <label for="imagePrompt">🎨 图片提示词：</label>
                        <textarea id="imagePrompt" placeholder="请输入或从上方使用 AI 生成的提示词..." rows="4"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>📐 图片尺寸：</label>
                        <div class="size-selector">
                            <div class="size-option" data-size="16:9" onclick="selectSize(this)">16:9 (宽屏)</div>
                            <div class="size-option" data-size="3:4" onclick="selectSize(this)">3:4 (竖版)</div>
                            <div class="size-option" data-size="1:1" onclick="selectSize(this)">1:1 (正方形)</div>
                            <div class="size-option selected" data-size="9:16" onclick="selectSize(this)">9:16 (手机)</div>
                            <div class="size-option" data-size="4:3" onclick="selectSize(this)">4:3 (标准)</div>
                            <div class="size-option" data-size="2:3" onclick="selectSize(this)">2:3 (人像)</div>
                        </div>
                    </div>
                    
                    <button class="btn btn-success" onclick="generateImage()" id="generateImageBtn">
                        🖼️ 开始生成图片
                    </button>
                    
                    <div class="loading" id="imageLoading">
                        <div class="spinner"></div>
                        <p>正在绘制图片，请稍候...</p>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p id="progressText" style="margin-top: 10px; color: #666;"></p>
                    </div>
                    
                    <div class="image-result" id="imageResult">
                        <img id="generatedImage" class="generated-image" src="" alt="生成的图片" onclick="viewImageFullscreen()" style="cursor: pointer;">
                        <div class="image-actions">
                            <button class="btn btn-info" onclick="downloadImage()">⬇️ 下载图片</button>
                            <button class="btn btn-primary" onclick="regenerateImage()" id="regenerateBtn">🔄 重新生成</button>
                        </div>
                    </div>
                    
                    <div class="alert alert-error" id="imageError"></div>
                    <div class="alert alert-success" id="imageSuccess"></div>
                </div>
            </div>
            
            <!-- 历史记录区域 -->
            <div class="section history-section">
                <h2 class="section-title">📚 生成历史</h2>
                <button class="btn btn-info" onclick="loadHistory()" style="margin-bottom: 20px;">
                    🔄 刷新历史
                </button>
                
                <div class="history-grid" id="historyGrid">
                    <div class="empty-history" id="emptyHistory">
                        <p>暂无生成记录</p>
                        <p style="font-size: 14px; margin-top: 10px;">开始生成你的第一张图片吧！</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentTaskId = null;
        let pollInterval = null;
        let selectedSize = '9:16'; // 默认 9:16
        let isGenerating = false; // 防止重复生成
        
        // 页面加载时自动加载历史记录
        document.addEventListener('DOMContentLoaded', function() {
            loadHistory();
        });
        
        // 选择尺寸
        function selectSize(element) {
            document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedSize = element.getAttribute('data-size');
        }
        
        // 生成提示词
        async function generatePrompt() {
            const keyword = document.getElementById('keywordInput').value.trim();
            if (!keyword) {
                showAlert('promptError', '请输入关键词！');
                return;
            }
            
            hideAlert('promptError');
            document.getElementById('generatePromptBtn').disabled = true;
            document.getElementById('promptLoading').style.display = 'block';
            document.getElementById('generatedPrompt').value = '';
            document.getElementById('usePromptBtn').style.display = 'none';
            
            try {
                // 调用 AI 对话 API 生成提示词
                const response = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: `Please generate a detailed prompt for AI image generation based on the following keywords.

【Advanced Prompt Structure Requirements】
Please generate the prompt following this structure:
1. **Basic Structure**: [Subject] + [Action/State] + [Background/Environment]
2. **Style Modifiers**: e.g., "cyberpunk style", "Studio Ghibli style", "Makoto Shinkai style", "Michelangelo style", etc.
3. **Specific Details**: Include information about composition, perspective, colors, lighting, textures, etc.
4. **Camera Angles**: e.g., "wide-angle lens shot", "bird's eye view", "medium shot", "close-up shot", etc.
5. **Emotional Tone**: Describe the mood or atmosphere of the scene, e.g., "mysterious", "warm and cozy", "epic", etc.
6. **Artist References**: e.g., "in the style of Hayao Miyazaki", "in the style of Makoto Shinkai", "in the style of Van Gogh", etc.
7. **Lighting Description**: e.g., "soft morning light", "cyberpunk neon lights", "cinematic lighting", "dramatic lighting", etc.
8. **Texture/Material**: e.g., "smooth marble texture", "polished metal surface", "fabric texture", etc.
9. **Image Quality**: e.g., "high quality, ultra HD, 8k resolution, fine details, HDR, cinematic quality", etc.

【Output Format Requirements】
- **USE ENGLISH ONLY**
- Only output the prompt text, no other explanations
- Length between 200-500 words, **NEVER EXCEED 1800 CHARACTERS**
- **MAX 1800 CHARACTERS - THIS IS CRITICAL!**
- **KEEP IT SIMPLE AND CONCISE** - Keep descriptions clear and direct, avoid overly complex sentences
- Focus on the most important visual elements, avoid unnecessary decorative details
- Use punctuation to organize sentence structure
- Include scene details, lighting effects, color schemes, composition methods, etc.
- Suitable for AI painting tools like Stable Diffusion
- Do not use compact tag format, write in complete descriptive paragraphs

【Prompt Optimization Example】
Original idea: "an eagle"
Optimized prompt: "A fierce eagle, in vibrant Japanese anime style, blending Studio Ghibli's detailed backgrounds with dynamic shonen manga action scenes. The eagle has exaggerated, expressive eyes with a determined gaze, feathers rendered with sharp, dynamic lines suggesting motion. Its wings are spread wide, massive wingspan filling the frame. The eagle wears a small samurai-inspired piece of armor on its chest, adding a touch of fantasy. Background blends traditional Japanese elements like cherry blossoms and Mount Fuji with a futuristic Tokyo skyline contrast. Scene features bright, saturated colors, dramatic lighting effects and speed lines emphasizing the eagle's power and agility. Overall composition creates energy and movement, typical of action manga scene style."

Keywords: ${keyword}`
                    })
                });
                
                if (!response.ok) {
                    throw new Error('请求失败');
                }
                
                const result = await response.json();
                console.log('AI 响应:', result); // 调试日志
                const generatedText = result.response || result.content || result.message || '';
                document.getElementById('generatedPrompt').value = generatedText;
                
                // 显示“使用此提示词”按钮
                if (generatedText) {
                    document.getElementById('usePromptBtn').style.display = 'block';
                }
                
            } catch (error) {
                showAlert('promptError', '生成提示词失败：' + error.message);
            } finally {
                document.getElementById('generatePromptBtn').disabled = false;
                document.getElementById('promptLoading').style.display = 'none';
            }
        }
        
        // 使用生成的提示词
        function useGeneratedPrompt() {
            const generatedPrompt = document.getElementById('generatedPrompt').value.trim();
            if (!generatedPrompt) {
                showAlert('imageError', '提示词为空，无法使用！');
                return;
            }
            
            // 填充到图片生成输入框
            document.getElementById('imagePrompt').value = generatedPrompt;
            
            // 滚动到图片生成区域
            document.querySelector('.image-generator').scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
            
            // 高亮显示图片生成输入框
            const imagePromptDiv = document.getElementById('imagePrompt').parentElement;
            imagePromptDiv.style.transition = 'all 0.5s ease';
            imagePromptDiv.style.boxShadow = '0 0 20px rgba(17, 153, 142, 0.5)';
            imagePromptDiv.style.borderRadius = '8px';
            
            setTimeout(() => {
                imagePromptDiv.style.boxShadow = 'none';
            }, 2000);
            
            // 显示成功提示
            showAlert('imageSuccess', '✅ 提示词已填充到下方输入框，您可以直接点击“开始生成图片”按钮！');
        }
        
        // 生成图片
        async function generateImage() {
            const prompt = document.getElementById('imagePrompt').value.trim();
            if (!prompt) {
                showAlert('imageError', '请输入图片提示词！');
                return;
            }
            
            // 检查是否正在生成
            if (isGenerating) {
                showAlert('imageError', '⚠️ 已有图片正在生成中，请耐心等待完成！');
                return;
            }
            
            hideAlert('imageError');
            hideAlert('imageSuccess');
            isGenerating = true;
            updateGenerateButtonState();
            
            document.getElementById('imageResult').style.display = 'none';
            document.getElementById('imageLoading').style.display = 'block';
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '进度：0%';
            
            try {
                // 创建生成任务
                const response = await fetch('/api/image/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        size: selectedSize
                    })
                });
                
                if (!response.ok) {
                    throw new Error('创建任务失败');
                }
                
                const result = await response.json();
                if (result.success && result.taskId) {
                    currentTaskId = result.taskId;
                    pollTaskStatus();
                } else {
                    throw new Error(result.error || '创建任务失败');
                }
                
            } catch (error) {
                showAlert('imageError', '生成图片失败：' + error.message);
                isGenerating = false;
                updateGenerateButtonState();
                document.getElementById('imageLoading').style.display = 'none';
            }
        }
        
        // 轮询任务状态
        async function pollTaskStatus() {
            if (!currentTaskId) return;
            
            try {
                const response = await fetch(`/api/image/status/${currentTaskId}`);
                if (!response.ok) {
                    throw new Error('查询状态失败');
                }
                
                const result = await response.json();
                
                if (result.success) {
                    const progress = result.progress || 0;
                    document.getElementById('progressFill').style.width = progress + '%';
                    document.getElementById('progressText').textContent = `进度：${progress}%`;
                    
                    if (result.status === 'completed' && result.imageUrl) {
                        // 生成完成
                        clearInterval(pollInterval);
                        isGenerating = false;
                        updateGenerateButtonState();
                        showGeneratedImage(result.imageUrl);
                        // 保存到历史记录
                        await saveToHistory(document.getElementById('imagePrompt').value, result.imageUrl);
                    } else if (result.status === 'failed') {
                        // 生成失败
                        clearInterval(pollInterval);
                        isGenerating = false;
                        updateGenerateButtonState();
                        showAlert('imageError', result.error || '图片生成失败');
                        document.getElementById('imageLoading').style.display = 'none';
                    } else if (result.status === 'processing' || result.status === 'pending') {
                        // 正在处理中，继续轮询
                        console.log(`图片生成进度：${progress}% - ${result.status}`);
                    }
                }
                
            } catch (error) {
                console.error('轮询失败:', error);
            }
            
            if (pollInterval) {
                clearInterval(pollInterval);
            }
            pollInterval = setInterval(pollTaskStatus, 2000); // 每 2 秒查询一次
        }
        
        // 显示生成的图片
        function showGeneratedImage(imageUrl) {
            document.getElementById('generatedImage').src = imageUrl;
            document.getElementById('imageResult').style.display = 'block';
            document.getElementById('imageLoading').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';
            updateGenerateButtonState();
            showAlert('imageSuccess', '图片生成成功！');
        }
        
        // 下载图片
        function downloadImage() {
            const imageUrl = document.getElementById('generatedImage').src;
            const link = document.createElement('a');
            link.href = imageUrl;
            link.download = 'ai_generated_' + Date.now() + '.png';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // 全屏查看图片
        function viewImageFullscreen() {
            const imageUrl = document.getElementById('generatedImage').src;
            if (!imageUrl) return;
            
            // 创建全屏容器
            const fullscreenDiv = document.createElement('div');
            fullscreenDiv.id = 'imageFullscreen';
            fullscreenDiv.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.95);
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            `;
            
            const img = document.createElement('img');
            img.src = imageUrl;
            img.style.cssText = `
                max-width: 90%;
                max-height: 90%;
                object-fit: contain;
                box-shadow: 0 0 30px rgba(0,0,0,0.5);
            `;
            
            fullscreenDiv.appendChild(img);
            document.body.appendChild(fullscreenDiv);
            
            // 点击关闭
            fullscreenDiv.onclick = function() {
                document.body.removeChild(fullscreenDiv);
            };
            
            // ESC 键关闭
            const escHandler = function(e) {
                if (e.key === 'Escape') {
                    document.body.removeChild(fullscreenDiv);
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
        }
        
        // 重新生成
        function regenerateImage() {
            // 检查是否正在生成
            if (isGenerating) {
                showAlert('imageError', '⚠️ 已有图片正在生成中，请耐心等待完成！');
                return;
            }
            generateImage();
        }
        
        // 更新按钮状态
        function updateGenerateButtonState() {
            const generateBtn = document.getElementById('generateImageBtn');
            const regenerateBtn = document.getElementById('regenerateBtn');
            
            if (isGenerating) {
                generateBtn.disabled = true;
                generateBtn.innerHTML = '⏳ 正在生成中...';
                if (regenerateBtn) {
                    regenerateBtn.disabled = true;
                }
            } else {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '🖼️ 开始生成图片';
                if (regenerateBtn) {
                    regenerateBtn.disabled = false;
                }
            }
        }
        
        // 保存历史记录
        async function saveToHistory(prompt, imageUrl) {
            try {
                // 先检查是否已存在相同的图片 URL
                const response = await fetch('/api/image/history');
                if (response.ok) {
                    const history = await response.json();
                    // 如果已存在相同 URL 的图片，则不重复保存
                    const exists = history.some(item => item.imageUrl === imageUrl);
                    if (exists) {
                        console.log('图片已存在于历史记录中，跳过保存');
                        return;
                    }
                }
                
                // 不存在则保存
                await fetch('/api/image/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        imageUrl: imageUrl
                    })
                });
                console.log('历史记录保存成功');
            } catch (error) {
                console.error('保存历史失败:', error);
            }
        }
        
        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch('/api/image/history');
                if (!response.ok) {
                    throw new Error('加载失败');
                }
                
                const history = await response.json();
                const historyGrid = document.getElementById('historyGrid');
                
                if (history.length === 0) {
                    historyGrid.innerHTML = '<div class="empty-history"><p>暂无生成记录</p><p style="font-size: 14px; margin-top: 10px;">开始生成你的第一张图片吧！</p></div>';
                    return;
                }
                
                // 去重：使用 Map 按 imageUrl 去重
                const uniqueMap = new Map();
                history.forEach(item => {
                    if (!uniqueMap.has(item.imageUrl)) {
                        uniqueMap.set(item.imageUrl, item);
                    }
                });
                
                // 转换为数组并按时间倒序排序
                const uniqueHistory = Array.from(uniqueMap.values());
                uniqueHistory.sort((a, b) => {
                    return new Date(b.createTime) - new Date(a.createTime);
                });
                
                let html = '';
                uniqueHistory.forEach(item => {
                    const date = new Date(item.createTime).toLocaleString('zh-CN');
                    html += `
                        <div class="history-card">
                            <img src="${item.imageUrl}" alt="生成的图片" class="history-image">
                            <div class="history-info">
                                <div class="history-prompt">${escapeHtml(item.prompt)}</div>
                                <div class="history-date">🕐 ${date}</div>
                            </div>
                        </div>
                    `;
                });
                
                historyGrid.innerHTML = html;
                
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }
        
        // 显示提示
        function showAlert(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }
        
        // 隐藏提示
        function hideAlert(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
