<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作历史 · 梦境创作</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dream-pink: #fce4ec;
            --dream-lavender: #e8eaf6;
            --dream-mint: #e0f7fa;
            --dream-peach: #fff3e0;
            --accent-purple: #9c27b0;
            --accent-blue: #3f51b5;
            --accent-teal: #009688;
            --text-dark: #5d4037;
            --text-light: #8d6e63;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dream-pink) 0%, var(--dream-lavender) 25%, var(--dream-mint) 50%, var(--dream-peach) 75%, var(--dream-pink) 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        .floating-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, #ffb3d9, transparent); top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, #b3d9ff, transparent); top: 30%; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #b3ffe0, transparent); bottom: -50px; left: 30%; animation-delay: -10s; }
        .orb-4 { width: 250px; height: 250px; background: radial-gradient(circle, #ffe0b3, transparent); bottom: 20%; right: 20%; animation-delay: -7s; }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 6px;
        }

        .header .subtitle {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(156, 39, 176, 0.15);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 35px;
            margin-bottom: 25px;
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(5px);
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .task-status {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 15px;
        }

        .status-COMPLETED {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        .status-RUNNING {
            background: rgba(33, 150, 243, 0.15);
            color: #2196f3;
        }

        .status-FAILED {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
        }

        .status-PENDING {
            background: rgba(158, 158, 158, 0.15);
            color: #9e9e9e;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-left: 20px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.8rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-view {
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
            color: white;
            font-weight: 500;
        }

        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 150, 136, 0.3);
        }

        .btn-novel {
            background: linear-gradient(135deg, var(--accent-purple), #e91e63);
            color: white;
            font-weight: 500;
        }

        .btn-novel:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3);
        }

        .btn-params {
            background: rgba(156, 39, 176, 0.1);
            color: var(--accent-purple);
            border: 1px solid rgba(156, 39, 176, 0.3);
        }

        .btn-params:hover {
            background: rgba(156, 39, 176, 0.2);
        }

        .btn-delete {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .btn-delete:hover {
            background: rgba(244, 67, 54, 0.2);
        }

        .novel-title-link {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .novel-title-link:hover {
            color: var(--accent-blue);
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .progress-mini {
            width: 100px;
            height: 6px;
            background: rgba(93, 64, 55, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-mini-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* 模态框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 35px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.1);
        }

        .modal-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--text-dark);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--text-dark);
        }

        .param-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .param-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 15px;
        }

        .param-item.full-width {
            grid-column: 1 / -1;
        }

        .param-label {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .param-value {
            font-size: 0.95rem;
            color: var(--text-dark);
            word-break: break-word;
        }

        .param-value.keyword {
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .param-value.requires {
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(93, 64, 55, 0.1);
        }

        .btn-modal {
            flex: 1;
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(156, 39, 176, 0.35);
        }

        .btn-secondary {
            background: rgba(93, 64, 55, 0.1);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: rgba(93, 64, 55, 0.15);
        }
    </style>
</head>
<body>
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>创作历史</h1>
            <p class="subtitle">回顾你的创作历程</p>
            <div class="nav-links">
                <a href="/" class="nav-link">返回首页</a>
                <a href="/novel-generator" class="nav-link">新建创作</a>
            </div>
        </div>

        <div class="glass-card">
            <div id="taskList"></div>
        </div>
    </div>

    <!-- 参数查看模态框 -->
    <div class="modal-overlay" id="paramsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">生成参数</h2>
                <button class="modal-close" onclick="closeParamsModal()">&times;</button>
            </div>
            <div class="param-grid" id="paramsContent">
                <!-- 动态填充 -->
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-secondary" onclick="closeParamsModal()">关闭</button>
                <button class="btn-modal btn-primary" onclick="useParamsToGenerate()">使用此参数重新生成</button>
            </div>
        </div>
    </div>

    <script>
        let currentTaskParams = null;

        // 加载任务列表
        async function loadTasks() {
            try {
                const response = await fetch('/api/novel-generator/tasks');
                const tasks = await response.json();

                const taskList = document.getElementById('taskList');

                if (tasks.length === 0) {
                    taskList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <p>还没有创作记录</p>
                            <p style="margin-top: 10px; font-size: 0.9rem;">
                                <a href="/novel-generator" style="color: var(--accent-purple);">开始你的第一次创作</a>
                            </p>
                        </div>
                    `;
                    return;
                }

                taskList.innerHTML = tasks.map(task => `
                    <div class="task-item" data-task-id="${task.taskId}">
                        <div class="task-info">
                            <div class="task-title">
                                ${task.status === 'COMPLETED' && task.resultNovelId && task.resultNovelTitle
                                    ? `<a href="/novel/${task.resultNovelId}" class="novel-title-link">${task.resultNovelTitle}</a>`
                                    : (task.resultNovelTitle || task.taskId)
                                }
                            </div>
                            <div class="task-meta">
                                创建时间: ${task.createTime || '未知'}
                                ${task.durationSeconds ? ' · 耗时: ' + formatDuration(task.durationSeconds) : ''}
                                ${task.chapterCount ? ' · 章节数: ' + task.chapterCount : ''}
                            </div>
                            ${task.status === 'RUNNING' ? `
                                <div class="progress-mini">
                                    <div class="progress-mini-bar" style="width: ${task.progress}%"></div>
                                </div>
                            ` : ''}
                        </div>
                        <span class="task-status status-${task.status}">${getStatusText(task.status)}</span>
                        <div class="task-actions">
                            <button class="btn-small btn-params" onclick='showParams(${JSON.stringify(task).replace(/'/g, "&#39;")})'>📋 参数</button>
                            ${task.resultNovelId ? `
                                <a href="/novel/${task.resultNovelId}" class="btn-small btn-novel">📖 查看</a>
                            ` : ''}
                            ${task.status === 'RUNNING' ? `
                                <a href="/novel-generator" class="btn-small btn-view">进度</a>
                            ` : ''}
                            ${task.status !== 'RUNNING' ? `
                                <button class="btn-small btn-delete" onclick="deleteTask('${task.taskId}')">删除</button>
                            ` : ''}
                        </div>
                    </div>
                `).join('');

                // 如果有运行中的任务，定期刷新
                const runningTasks = tasks.filter(t => t.status === 'RUNNING');
                if (runningTasks.length > 0) {
                    setTimeout(loadTasks, 5000);
                }
            } catch (error) {
                console.error('加载任务列表失败:', error);
            }
        }

        // 显示参数模态框
        function showParams(task) {
            currentTaskParams = task;

            const content = document.getElementById('paramsContent');
            content.innerHTML = `
                <div class="param-item full-width">
                    <div class="param-label">故事大纲 / 关键词</div>
                    <div class="param-value keyword">${escapeHtml(task.keyword || '无')}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">章节数量</div>
                    <div class="param-value">${task.chapterCount || 8} 章</div>
                </div>
                <div class="param-item">
                    <div class="param-label">文学体裁</div>
                    <div class="param-value">${task.genre || '记叙文'}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">角色数量</div>
                    <div class="param-value">${task.roleCount || 3} 个</div>
                </div>
                <div class="param-item">
                    <div class="param-label">叙述视角</div>
                    <div class="param-value">${task.pointOfView || '第三人称全知视角'}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">主角名称</div>
                    <div class="param-value">${task.protagonist || '未指定'}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">玩法类型</div>
                    <div class="param-value">${task.gameplay || 'BDSM'}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">工具类型</div>
                    <div class="param-value">${task.tools || 'BDSM'}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">生成新世界观</div>
                    <div class="param-value">${task.newWorld ? '是' : '否'}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">语言风格</div>
                    <div class="param-value">${task.languageStyle || '直白、露骨'}</div>
                </div>
                <div class="param-item">
                    <div class="param-label">每章字数</div>
                    <div class="param-value">${task.wordsPerChapter || 3000} 字</div>
                </div>
                <div class="param-item full-width">
                    <div class="param-label">扩写需求</div>
                    <div class="param-value requires">${escapeHtml(task.requires || '无')}</div>
                </div>
            `;

            document.getElementById('paramsModal').classList.add('active');
        }

        // 关闭参数模态框
        function closeParamsModal() {
            document.getElementById('paramsModal').classList.remove('active');
            currentTaskParams = null;
        }

        // 使用参数重新生成
        function useParamsToGenerate() {
            if (!currentTaskParams) return;

            // 将参数存储到 localStorage
            const params = {
                chapterCount: currentTaskParams.chapterCount || 8,
                keyword: currentTaskParams.keyword || '',
                genre: currentTaskParams.genre || '记叙文',
                requires: currentTaskParams.requires || '',
                newWorld: currentTaskParams.newWorld || false,
                roleCount: currentTaskParams.roleCount || 3,
                gameplay: currentTaskParams.gameplay || 'BDSM',
                tools: currentTaskParams.tools || 'BDSM',
                pointOfView: currentTaskParams.pointOfView || '第三人称全知视角',
                protagonist: currentTaskParams.protagonist || '',
                languageStyle: currentTaskParams.languageStyle || '直白、露骨',
                wordsPerChapter: currentTaskParams.wordsPerChapter || 3000
            };

            localStorage.setItem('novelGeneratorParams', JSON.stringify(params));

            // 跳转到生成页面
            window.location.href = '/novel-generator?useParams=true';
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 删除任务
        async function deleteTask(taskId) {
            if (!confirm('确定要删除这条记录吗？')) return;

            try {
                const response = await fetch('/api/novel-generator/tasks/' + taskId, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadTasks();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
            }
        }

        // 格式化时长
        function formatDuration(seconds) {
            if (seconds < 60) return seconds + '秒';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分钟';
            return Math.floor(seconds / 3600) + '小时' + Math.floor((seconds % 3600) / 60) + '分钟';
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'PENDING': '等待中',
                'RUNNING': '生成中',
                'COMPLETED': '已完成',
                'FAILED': '失败'
            };
            return statusMap[status] || status;
        }

        // 点击模态框外部关闭
        document.getElementById('paramsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeParamsModal();
            }
        });

        // ESC键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeParamsModal();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
