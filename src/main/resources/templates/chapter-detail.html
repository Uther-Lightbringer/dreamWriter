<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>章节详情 - 小说管理平台</title>
    <!-- 引入Marked.js用于Markdown渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入highlight.js用于代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        :root {
            /* 默认主题变量 */
            --bg-color: #ffffff;
            --text-color: #333333;
            --header-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --border-color: #dee2e6;
            --shadow-color: rgba(0,0,0,0.1);
            --font-size-base: 16px;
        }
        
        /* 暗黑主题变量 */
        .dark-theme {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --header-bg: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --card-bg: #2d2d2d;
            --border-color: #404040;
            --shadow-color: rgba(0,0,0,0.3);
        }
        
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            line-height: 1.8;
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--card-bg);
            box-shadow: 0 0 20px var(--shadow-color);
            min-height: 100vh;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        .header {
            background: var(--header-bg);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .breadcrumb {
            padding: 15px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .breadcrumb a {
            color: #007bff;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        /* 阅读设置区域 */
        .reading-settings-bar {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .setting-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .setting-label {
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
            transition: color 0.3s ease;
            white-space: nowrap;
        }
        
        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .font-size-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .font-size-btn:hover {
            background-color: var(--bg-color);
            transform: scale(1.1);
        }
        
        .font-size-display {
            min-width: 35px;
            text-align: center;
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
        }
        
        .theme-toggle {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .theme-toggle:hover {
            background-color: var(--bg-color);
            transform: translateY(-1px);
        }
        
        .reset-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #6c757d;
            background-color: #6c757d;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .reset-btn:hover {
            background-color: #545b62;
            transform: translateY(-1px);
        }
        
        .content {
            padding: 30px 40px;
        }
        .chapter-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            transition: border-color 0.3s ease;
        }
        .chapter-title {
            font-size: calc(var(--font-size-base) * 1.75);
            color: var(--text-color);
            margin-bottom: 10px;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .chapter-info {
            color: var(--text-color);
            font-size: calc(var(--font-size-base) * 0.875);
            opacity: 0.8;
            transition: color 0.3s ease;
        }
        .chapter-content {
            font-size: var(--font-size-base);
            color: var(--text-color);
            line-height: 1.8;
            margin: 30px 0;
            text-align: justify;
            transition: color 0.3s ease, font-size 0.3s ease;
        }
        
        /* Markdown样式优化 */
        .markdown-content {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.8;
            color: var(--text-color);
            font-size: var(--font-size-base);
            transition: all 0.3s ease;
        }
        
        .markdown-content h1, .markdown-content h2, .markdown-content h3, 
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            margin: 24px 0 16px 0;
            font-weight: 600;
            line-height: 1.25;
            color: var(--text-color);
            transition: color 0.3s ease;
        }
        
        .markdown-content h1 { font-size: calc(var(--font-size-base) * 2); border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        .markdown-content h2 { font-size: calc(var(--font-size-base) * 1.5); border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        .markdown-content h3 { font-size: calc(var(--font-size-base) * 1.25); }
        .markdown-content h4 { font-size: var(--font-size-base); }
        .markdown-content h5 { font-size: calc(var(--font-size-base) * 0.875); color: var(--text-color); opacity: 0.8; }
        .markdown-content h6 { font-size: calc(var(--font-size-base) * 0.85); color: var(--text-color); opacity: 0.7; }
        
        .markdown-content p {
            margin: 16px 0;
            line-height: 1.8;
            color: var(--text-color);
            transition: color 0.3s ease;
        }
        
        .markdown-content ul, .markdown-content ol {
            padding-left: 2em;
            margin: 16px 0;
            color: var(--text-color);
        }
        
        .markdown-content li {
            margin: 8px 0;
            color: var(--text-color);
        }
        
        .markdown-content blockquote {
            margin: 16px 0;
            padding: 0 1em;
            color: var(--text-color);
            opacity: 0.8;
            border-left: 0.25em solid var(--border-color);
            transition: color 0.3s ease, border-color 0.3s ease;
        }
        
        .markdown-content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27,31,35,0.05);
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            color: var(--text-color);
        }
        
        .dark-theme .markdown-content code {
            background-color: rgba(255,255,255,0.1);
        }
        
        .markdown-content pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 3px;
            margin: 16px 0;
        }
        
        .dark-theme .markdown-content pre {
            background-color: #2d2d2d;
        }
        
        .markdown-content pre code {
            padding: 0;
            margin: 0;
            overflow: visible;
            font-size: 100%;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
        }
        
        .markdown-content a {
            color: #0366d6;
            text-decoration: none;
        }
        
        .dark-theme .markdown-content a {
            color: #58a6ff;
        }
        
        .markdown-content a:hover {
            text-decoration: underline;
        }
        
        .markdown-content img {
            max-width: 100%;
            box-sizing: content-box;
            background-color: var(--card-bg);
        }
        
        .markdown-content table {
            display: block;
            width: 100%;
            overflow: auto;
            margin: 16px 0;
        }
        
        .markdown-content table th, .markdown-content table td {
            padding: 6px 13px;
            border: 1px solid var(--border-color);
            transition: border-color 0.3s ease;
        }
        
        .markdown-content table tr {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        
        .markdown-content table tr:nth-child(2n) {
            background-color: rgba(0,0,0,0.03);
        }
        
        .dark-theme .markdown-content table tr:nth-child(2n) {
            background-color: rgba(255,255,255,0.05);
        }
        
        .navigation {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            transition: border-color 0.3s ease;
        }
        .nav-button {
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            flex: 1;
            text-align: center;
            min-width: 100px;
        }
        .nav-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .nav-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .nav-button.secondary {
            background-color: #6c757d;
        }
        .nav-button.secondary:hover {
            background-color: #545b62;
        }
        .chapter-list-btn {
            background-color: #28a745;
        }
        .chapter-list-btn:hover {
            background-color: #218838;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-color);
            transition: color 0.3s ease;
        }
        .error-message {
            text-align: center;
            padding: 50px;
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            margin: 20px;
        }
        
        /* 文件上传控件样式 */
        .chapter-file-input {
            display: none;
        }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            .container {
                margin: 0;
                box-shadow: none;
            }
            .content {
                padding: 20px 15px;
            }
            .chapter-title {
                font-size: calc(var(--font-size-base) * 1.5);
            }
            .chapter-content {
                font-size: var(--font-size-base);
                line-height: 1.7;
            }
            .navigation {
                flex-direction: column;
                gap: 10px;
            }
            .nav-button {
                width: 100%;
                padding: 15px;
                font-size: 16px;
            }
            .breadcrumb {
                padding: 12px 15px;
                font-size: 14px;
            }
            .reading-settings-bar {
                padding: 12px 15px;
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .setting-group {
                justify-content: space-between;
            }
            .markdown-content {
                font-size: var(--font-size-base);
            }
            .markdown-content h1 { font-size: calc(var(--font-size-base) * 1.7); }
            .markdown-content h2 { font-size: calc(var(--font-size-base) * 1.4); }
            .markdown-content h3 { font-size: calc(var(--font-size-base) * 1.2); }
        }
        
        @media (max-width: 480px) {
            .content {
                padding: 15px 10px;
            }
            .chapter-title {
                font-size: calc(var(--font-size-base) * 1.375);
            }
            .chapter-content {
                font-size: calc(var(--font-size-base) * 0.875);
            }
            .nav-button {
                padding: 12px;
                font-size: 15px;
            }
            .font-size-btn {
                width: 24px;
                height: 24px;
                font-size: 14px;
            }
            .theme-toggle, .reset-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>小说阅读</h1>
        </div>
        
        <div class="breadcrumb">
            <a href="/">首页</a> &gt; 
            <a href="" id="novelLink">小说列表</a> &gt; 
            <span id="currentChapter">章节详情</span>
        </div>
        
        <!-- 阅读设置栏 -->
        <div class="reading-settings-bar">
            <div class="setting-group">
                <span class="setting-label">字体大小:</span>
                <div class="font-size-controls">
                    <button class="font-size-btn" onclick="adjustFontSize(-1)">A-</button>
                    <div class="font-size-display" id="fontSizeDisplay">16px</div>
                    <button class="font-size-btn" onclick="adjustFontSize(1)">A+</button>
                </div>
            </div>
            
            <div class="setting-group">
                <span class="setting-label">主题模式:</span>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
                    🌙 暗黑模式
                </button>
            </div>
            
            <div class="setting-group">
                <button class="reset-btn" onclick="resetSettings()">
                    🔄 重置
                </button>
            </div>
        </div>

        <div class="content">
            <div id="loading" class="loading">正在加载章节内容...</div>
            
            <div id="error" class="error-message" style="display: none;">
                加载失败，请稍后重试
            </div>
            
            <div id="chapterContent" style="display: none;">
                <div class="chapter-header">
                    <h2 class="chapter-title" id="chapterTitle"></h2>
                    <div class="chapter-info" id="chapterInfo"></div>
                </div>
                
                <!-- 章节插图区域 -->
                <div class="chapter-image-container" id="chapterImageContainer" style="display: none;">
                    <div id="chapterImageWrapper"></div>
                    <div class="chapter-image-controls">
                        <input type="file" id="chapterImageInput" class="chapter-file-input" accept="image/*">
                        <button type="button" class="chapter-upload-btn" onclick="document.getElementById('chapterImageInput').click()">
                            📤 上传插图
                        </button>
                        <button type="button" class="chapter-delete-btn" id="chapterDeleteBtn" onclick="deleteChapterImage()" style="display: none;">
                            🗑️ 删除插图
                        </button>
                    </div>
                </div>
                
                <div class="chapter-content">
                    <div class="markdown-content" id="chapterText"></div>
                </div>
                
                <div class="navigation">
                    <button id="prevButton" class="nav-button secondary" onclick="goToPrevious()" disabled>
                        上一章
                    </button>
                    
                    <button class="nav-button chapter-list-btn" onclick="goToChapterList()">
                        章节列表
                    </button>
                    
                    <button id="nextButton" class="nav-button" onclick="goToNext()" disabled>
                        下一章
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // 从URL获取参数
        const novelId = /*[[${novelId}]]*/ null;
        const chapterId = /*[[${chapterId}]]*/ null;
        
        // 验证ID
        if (!novelId || !chapterId) {
            console.error('小说ID或章节ID获取失败');
        }
        
        // 章节插图相关变量
        let currentChapterImage = null;
        
        // 阅读设置相关变量
        let currentFontSize = 16; // 默认字体大小
        let isDarkMode = false;   // 默认亮色主题
        
        // 配置marked.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                } else {
                    return hljs.highlightAuto(code).value;
                }
            },
            breaks: true,
            gfm: true
        });
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadReadingSettings();
            loadChapterDetail();
            setupImageUploadListeners();
        });
        
        // 设置图片上传监听器
        function setupImageUploadListeners() {
            document.getElementById('chapterImageInput').addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    uploadChapterImage(file);
                }
            });
        }

        // 加载阅读设置
        function loadReadingSettings() {
            // 从localStorage加载设置
            const savedFontSize = localStorage.getItem('fontSize');
            const savedTheme = localStorage.getItem('darkMode');
            
            if (savedFontSize) {
                currentFontSize = parseInt(savedFontSize);
                updateFontSize();
            }
            
            if (savedTheme !== null) {
                isDarkMode = savedTheme === 'true';
                updateTheme();
            }
            
            // 更新设置面板显示
            document.getElementById('fontSizeDisplay').textContent = currentFontSize + 'px';
            document.getElementById('themeToggle').innerHTML = 
                isDarkMode ? '☀️ 亮色模式' : '🌙 暗黑模式';
        }

        // 保存阅读设置
        function saveReadingSettings() {
            localStorage.setItem('fontSize', currentFontSize.toString());
            localStorage.setItem('darkMode', isDarkMode.toString());
        }

        // 调整字体大小
        function adjustFontSize(change) {
            const newSize = currentFontSize + change;
            if (newSize >= 12 && newSize <= 24) {
                currentFontSize = newSize;
                updateFontSize();
                document.getElementById('fontSizeDisplay').textContent = currentFontSize + 'px';
                saveReadingSettings();
            }
        }

        // 更新字体大小
        function updateFontSize() {
            document.documentElement.style.setProperty('--font-size-base', currentFontSize + 'px');
        }

        // 切换主题
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            updateTheme();
            document.getElementById('themeToggle').innerHTML = 
                isDarkMode ? '☀️ 亮色模式' : '🌙 暗黑模式';
            saveReadingSettings();
        }

        // 更新主题
        function updateTheme() {
            const body = document.body;
            const hljsTheme = document.getElementById('hljs-theme');
            
            if (isDarkMode) {
                body.classList.add('dark-theme');
                hljsTheme.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css';
            } else {
                body.classList.remove('dark-theme');
                hljsTheme.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css';
            }
        }

        // 重置设置
        function resetSettings() {
            if (confirm('确定要重置所有阅读设置吗？')) {
                currentFontSize = 16;
                isDarkMode = false;
                updateFontSize();
                updateTheme();
                document.getElementById('fontSizeDisplay').textContent = '16px';
                document.getElementById('themeToggle').innerHTML = '🌙 暗黑模式';
                localStorage.removeItem('fontSize');
                localStorage.removeItem('darkMode');
            }
        }

        // 加载章节详情
        function loadChapterDetail() {
            fetch(`/api/chapters/detail/${novelId}/${chapterId}`)
            .then(response => {
                if (response.status === 404) {
                    showError('章节不存在');
                    return null;
                }
                return response.json();
            })
            .then(detailView => {
                if (detailView) {
                    displayChapter(detailView);
                }
            })
            .catch(error => {
                console.error('加载章节详情失败:', error);
                showError('网络错误，请稍后重试');
            });
        }

        // 显示章节内容
        function displayChapter(detailView) {
            const chapter = detailView.chapter;
            
            // 设置面包屑导航链接
            document.getElementById('novelLink').href = `/novel/${novelId}`;
            document.getElementById('novelLink').textContent = detailView.novelTitle;
            document.getElementById('currentChapter').textContent = chapter.title;
            
            // 显示章节信息
            document.getElementById('chapterTitle').textContent = chapter.title;
            document.getElementById('chapterInfo').textContent = 
                `第${chapter.chapterNumber}章 | ` +
                `创建时间: ${new Date(chapter.createTime).toLocaleString()}`;
            
            // 处理章节插图
            handleChapterImage(chapter);
            
            // 渲染Markdown内容
            const content = chapter.content || '暂无内容';
            document.getElementById('chapterText').innerHTML = marked.parse(content);
            
            // 高亮代码块
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            // 设置导航按钮状态
            const prevButton = document.getElementById('prevButton');
            const nextButton = document.getElementById('nextButton');
            
            if (detailView.hasPrevious && detailView.previousChapterId) {
                prevButton.disabled = false;
                prevButton.onclick = () => goToChapter(detailView.previousChapterId);
            } else {
                prevButton.disabled = true;
            }
            
            if (detailView.hasNext && detailView.nextChapterId) {
                nextButton.disabled = false;
                nextButton.onclick = () => goToChapter(detailView.nextChapterId);
            } else {
                nextButton.disabled = true;
            }
            
            // 隐藏加载状态，显示内容
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('chapterContent').style.display = 'block';
        }

        // 显示错误信息
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('chapterContent').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = message;
        }

        // 跳转到指定章节
        function goToChapter(targetChapterId) {
            window.location.href = `/novel/${novelId}/chapter/${targetChapterId}`;
        }

        // 跳转到上一章
        function goToPrevious() {
            // 这个函数会在displayChapter中被重新绑定
        }

        // 跳转到下一章
        function goToNext() {
            // 这个函数会在displayChapter中被重新绑定
        }

        // 跳转到章节列表
        function goToChapterList() {
            window.location.href = `/novel/${novelId}`;
        }
        
        // 处理章节插图显示
        function handleChapterImage(chapter) {
            const container = document.getElementById('chapterImageContainer');
            const wrapper = document.getElementById('chapterImageWrapper');
            const deleteBtn = document.getElementById('chapterDeleteBtn');
            
            if (chapter.chapterImage) {
                // 显示已有的插图
                wrapper.innerHTML = `
                    <img src="${chapter.chapterImage}" alt="章节插图" class="chapter-image">
                `;
                container.style.display = 'block';
                deleteBtn.style.display = 'inline-block';
                currentChapterImage = chapter.chapterImage;
            } else {
                // 显示占位符
                wrapper.innerHTML = `
                    <div class="chapter-image-placeholder">
                        📖<br>暂无插图<br>点击上传
                    </div>
                `;
                container.style.display = 'block';
                deleteBtn.style.display = 'none';
                currentChapterImage = null;
            }
        }
        
        // 上传章节插图
        function uploadChapterImage(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            // 显示上传状态
            const uploadBtn = document.querySelector('.chapter-upload-btn');
            const originalText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '📤 上传中...';
            uploadBtn.disabled = true;
            
            fetch(`/api/images/chapter/${chapterId}/image`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert('上传失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('上传失败:', error);
                alert('上传失败');
            })
            .finally(() => {
                uploadBtn.innerHTML = originalText;
                uploadBtn.disabled = false;
                document.getElementById('chapterImageInput').value = '';
            });
        }
        
        // 删除章节插图
        function deleteChapterImage() {
            if (confirm('确定要删除章节插图吗？')) {
                // 显示删除状态
                const deleteBtn = document.getElementById('chapterDeleteBtn');
                const originalText = deleteBtn.innerHTML;
                deleteBtn.innerHTML = '🗑️ 删除中...';
                deleteBtn.disabled = true;
                
                fetch(`/api/images/chapter/${chapterId}/image`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('删除失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('删除失败:', error);
                    alert('删除失败');
                })
                .finally(() => {
                    deleteBtn.innerHTML = originalText;
                    deleteBtn.disabled = false;
                });
            }
        }
    </script>
</body>
</html>
