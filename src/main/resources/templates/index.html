<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境文阁 · 小说收藏系统</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dream-pink: #fce4ec;
            --dream-lavender: #e8eaf6;
            --dream-mint: #e0f7fa;
            --dream-peach: #fff3e0;
            --accent-purple: #9c27b0;
            --accent-blue: #3f51b5;
            --accent-teal: #009688;
            --accent-green: #4caf50;
            --text-dark: #5d4037;
            --text-light: #8d6e63;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dream-pink) 0%, var(--dream-lavender) 25%, var(--dream-mint) 50%, var(--dream-peach) 75%, var(--dream-pink) 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        /* 梦幻气泡背景 */
        .floating-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ffb3d9, transparent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #b3d9ff, transparent);
            top: 30%;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #b3ffe0, transparent);
            bottom: -50px;
            left: 30%;
            animation-delay: -10s;
        }

        .orb-4 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #ffe0b3, transparent);
            bottom: 20%;
            right: 20%;
            animation-delay: -7s;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* 头部设计 */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(156, 39, 176, 0.3);
        }

        .header .subtitle {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 功能按钮组 */
        .header-actions {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮样式 */
        .dream-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .dream-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .dream-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .dream-btn span {
            position: relative;
            z-index: 1;
        }

        .dream-btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #66bb6a);
            color: white;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }

        .dream-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(76, 175, 80, 0.5);
        }

        .dream-btn-purple {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            box-shadow: 0 8px 25px rgba(156, 39, 176, 0.4);
        }

        .dream-btn-purple:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(156, 39, 176, 0.5);
        }

        .dream-btn-pink {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
        }

        .dream-btn-pink:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        .dream-btn-teal {
            background: linear-gradient(135deg, var(--accent-teal), #4db6ac);
            color: white;
            box-shadow: 0 8px 25px rgba(0, 150, 136, 0.4);
        }

        .dream-btn-teal:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 150, 136, 0.5);
        }

        /* 小说列表 - 玻璃态卡片 */
        .novel-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .novel-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .novel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .novel-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
        }

        .novel-card:hover::before {
            opacity: 1;
        }

        .novel-cover {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .novel-card:hover .novel-cover {
            transform: scale(1.08);
        }

        .cover-wrapper {
            overflow: hidden;
            position: relative;
        }

        .novel-cover-placeholder {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, var(--dream-lavender), var(--dream-mint));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-size: 3rem;
            flex-direction: column;
            gap: 10px;
        }

        .novel-cover-placeholder span {
            font-size: 1rem;
        }

        .novel-content {
            padding: 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .novel-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.4rem;
            color: var(--text-dark);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .novel-info {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .novel-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 18px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(156, 39, 176, 0.15);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-actions {
            margin-top: auto;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .card-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .card-btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #5c6bc0);
            color: white;
        }

        .card-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(63, 81, 181, 0.4);
        }

        .card-btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }

        .card-btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(238, 90, 90, 0.4);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            opacity: 0.6;
        }

        .empty-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .empty-desc {
            color: var(--text-light);
            font-size: 1rem;
        }

        /* 响应式优化 */
        @media (max-width: 1024px) {
            .novel-list {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 22px;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
                letter-spacing: 4px;
            }

            .container {
                padding: 20px 15px;
            }

            .novel-list {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .novel-cover,
            .novel-cover-placeholder {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <!-- 梦幻背景装饰 -->
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>梦境文阁</h1>
            <p class="subtitle">在文字的世界里编织梦幻</p>
        </header>

        <!-- 功能按钮组 -->
        <div class="header-actions">
            <a href="/novel/add" class="dream-btn dream-btn-primary">
                <span>➕</span>
                <span>添加新小说</span>
            </a>
            <a href="/ai-chat" class="dream-btn dream-btn-purple">
                <span>🤖</span>
                <span>AI 对话助手</span>
            </a>
            <a href="/novel-generator" class="dream-btn dream-btn-purple">
                <span>📖</span>
                <span>梦境创作</span>
            </a>
            <a href="/ai-image-generator" class="dream-btn dream-btn-pink">
                <span>🎨</span>
                <span>梦境画坊</span>
            </a>
            <a href="/ai-image-history" class="dream-btn dream-btn-teal">
                <span>📷</span>
                <span>梦境画廊</span>
            </a>
            <a href="/creative-guide" class="dream-btn" style="background: linear-gradient(135deg, #ff9800, #ffb74d); color: white; box-shadow: 0 8px 25px rgba(255, 152, 0, 0.4);">
                <span>✨</span>
                <span>创作引导</span>
            </a>
            <a href="/genre-select" class="dream-btn" style="background: linear-gradient(135deg, #8e24aa, #ba68c8); color: white; box-shadow: 0 8px 25px rgba(142, 36, 170, 0.4);">
                <span>📝</span>
                <span>体裁创作</span>
            </a>
            <a href="/scripts" class="dream-btn" style="background: linear-gradient(135deg, #5c6bc0, #7986cb); color: white; box-shadow: 0 8px 25px rgba(92, 107, 192, 0.4);">
                <span>🎬</span>
                <span>我的剧本</span>
            </a>
            <a href="/visual-works" class="dream-btn" style="background: linear-gradient(135deg, #26a69a, #4db6ac); color: white; box-shadow: 0 8px 25px rgba(38, 166, 154, 0.4);">
                <span>🎨</span>
                <span>视觉叙事</span>
            </a>
            <a href="/essays" class="dream-btn" style="background: linear-gradient(135deg, #ef6c00, #ff8a65); color: white; box-shadow: 0 8px 25px rgba(239, 108, 0, 0.4);">
                <span>✍️</span>
                <span>我的散文</span>
            </a>
            <a href="/settings/deepseek" class="dream-btn" style="background: linear-gradient(135deg, #607d8b, #78909c); color: white; box-shadow: 0 8px 25px rgba(96, 125, 139, 0.4);">
                <span>⚙️</span>
                <span>模型设置</span>
            </a>
            <a href="/settings/image" class="dream-btn" style="background: linear-gradient(135deg, #e91e63, #f06292); color: white; box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4);">
                <span>🎨</span>
                <span>绘画模型</span>
            </a>
        </div>

        <!-- 小说列表 -->
        <div class="novel-list" id="novelList">
            <!-- 小说卡片将在这里动态加载 -->
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📚</div>
            <h2 class="empty-title">文阁空空如也</h2>
            <p class="empty-desc">还没有故事在这里栖息</p>
        </div>
    </div>

    <script>
        // 页面加载时获取小说列表
        document.addEventListener('DOMContentLoaded', function() {
            loadNovels();
        });

        // 加载小说列表
        function loadNovels() {
            fetch('/api/novels')
            .then(response => response.json())
            .then(novels => {
                const novelListDiv = document.getElementById('novelList');
                const emptyStateDiv = document.getElementById('emptyState');

                if (novels.length === 0) {
                    novelListDiv.style.display = 'none';
                    emptyStateDiv.style.display = 'block';
                    return;
                }

                novelListDiv.style.display = 'grid';
                emptyStateDiv.style.display = 'none';

                let html = '';
                novels.forEach(novel => {
                    // 处理封面图片
                    let coverHtml = '';
                    if (novel.coverImage) {
                        coverHtml = `
                            <div class="cover-wrapper">
                                <img src="${novel.coverImage}" alt="${novel.title}" class="novel-cover">
                            </div>
                        `;
                    } else {
                        coverHtml = `
                            <div class="cover-wrapper">
                                <div class="novel-cover-placeholder">
                                    📖
                                    <span>暂无封面</span>
                                </div>
                            </div>
                        `;
                    }

                    html += `
                        <div class="novel-card">
                            ${coverHtml}
                            <div class="novel-content">
                                <div class="novel-title">${escapeHtml(novel.title)}</div>
                                <div class="novel-info">ID: ${novel.id}</div>
                                <div class="novel-stats">
                                    <span class="stat-item">
                                        <span>📄</span>
                                        <span>${novel.chaptersCount} 章</span>
                                    </span>
                                    <span class="stat-item">
                                        <span>🕐</span>
                                        <span>${new Date(novel.createTime).toLocaleDateString()}</span>
                                    </span>
                                </div>
                                <div class="card-actions">
                                    <a href="/novel/${novel.id}" class="card-btn card-btn-primary">
                                        <span>📖</span>
                                        <span>管理章节</span>
                                    </a>
                                    <button onclick="deleteNovel(${novel.id})" class="card-btn card-btn-danger">
                                        <span>🗑️</span>
                                        <span>删除</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                novelListDiv.innerHTML = html;
            })
            .catch(error => {
                console.error('加载小说列表失败:', error);
            });
        }

        // 删除小说
        function deleteNovel(novelId) {
            if (!confirm('确定要让这个故事从梦境中消失吗？这将同时删除所有章节。')) {
                return;
            }

            fetch(`/api/novels/${novelId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadNovels(); // 重新加载小说列表
                } else {
                    alert('故事不愿离去...');
                }
            })
            .catch(error => {
                console.error('删除失败:', error);
            });
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
