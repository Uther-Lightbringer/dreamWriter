<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境创作 · 小说生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dream-pink: #fce4ec;
            --dream-lavender: #e8eaf6;
            --dream-mint: #e0f7fa;
            --dream-peach: #fff3e0;
            --accent-purple: #9c27b0;
            --accent-blue: #3f51b5;
            --accent-teal: #009688;
            --text-dark: #5d4037;
            --text-light: #8d6e63;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dream-pink) 0%, var(--dream-lavender) 25%, var(--dream-mint) 50%, var(--dream-peach) 75%, var(--dream-pink) 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        .floating-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, #ffb3d9, transparent); top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, #b3d9ff, transparent); top: 30%; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #b3ffe0, transparent); bottom: -50px; left: 30%; animation-delay: -10s; }
        .orb-4 { width: 250px; height: 250px; background: radial-gradient(circle, #ffe0b3, transparent); bottom: 20%; right: 20%; animation-delay: -7s; }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 6px;
        }

        .header .subtitle {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(156, 39, 176, 0.15);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 35px;
            margin-bottom: 25px;
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.4rem;
            color: var(--text-dark);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent-purple), var(--accent-blue));
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(93, 64, 55, 0.15);
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: 'Noto Serif SC', serif;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(156, 39, 176, 0.1);
            background: rgba(255, 255, 255, 0.9);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-purple);
        }

        .btn-primary {
            width: 100%;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-family: 'ZCOOL XiaoWei', serif;
            color: white;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 3px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(156, 39, 176, 0.35);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 进度区域 */
        .progress-section {
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar-container {
            background: rgba(93, 64, 55, 0.1);
            border-radius: 50px;
            height: 24px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-teal));
            border-radius: 50px;
            transition: width 0.5s ease;
            background-size: 200% 100%;
            animation: progressShimmer 2s linear infinite;
        }

        @keyframes progressShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-text {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .progress-percent {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--accent-purple);
        }

        .log-area {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 20px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(93, 64, 55, 0.05);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        /* 结果区域 */
        .result-section {
            display: none;
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }

        .result-section.active {
            display: block;
        }

        .result-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .result-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .result-novel-title {
            font-size: 1.4rem;
            color: var(--accent-purple);
            margin-bottom: 25px;
        }

        .btn-view {
            display: inline-block;
            padding: 14px 40px;
            font-size: 1rem;
            color: white;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 150, 136, 0.35);
        }

        .error-section {
            display: none;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 14px;
            padding: 20px;
            color: #c62828;
            margin-top: 20px;
        }

        .error-section.active {
            display: block;
        }

        /* 高级选项折叠 */
        .advanced-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-light);
            font-size: 0.9rem;
            padding: 10px 0;
            border-top: 1px solid rgba(93, 64, 55, 0.1);
            margin-top: 20px;
        }

        .advanced-toggle:hover {
            color: var(--accent-purple);
        }

        .advanced-options {
            display: none;
            padding-top: 20px;
        }

        .advanced-options.active {
            display: block;
        }

        .char-count {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        /* ========== 创作引导样式 ========== */
        .btn-guidance {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 0.9rem;
            color: white;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
        }

        .btn-guidance:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 150, 136, 0.35);
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            z-index: 100;
            transform: translateX(-280px);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-family: 'ZCOOL XiaoWei', serif;
            color: var(--text-dark);
            font-size: 1.2rem;
        }

        .sidebar-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .btn-new-session {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: white;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-new-session:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(156, 39, 176, 0.3);
        }

        .session-card {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .session-card:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--accent-purple);
        }

        .session-card.active {
            background: rgba(156, 39, 176, 0.1);
            border-color: var(--accent-purple);
        }

        .session-title {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-time {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .sidebar-toggle {
            position: fixed;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-50%) scale(1.1);
        }

        .sidebar.open + .sidebar-toggle {
            left: 295px;
        }

        /* 对话模态框 */
        .chat-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .chat-modal.open {
            display: flex;
        }

        .chat-container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            display: flex;
            overflow: hidden;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-family: 'ZCOOL XiaoWei', serif;
            color: var(--text-dark);
        }

        .chat-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
        }

        .message.user .message-avatar {
            background: var(--accent-teal);
            color: white;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-dark);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
        }

        .message-options {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .option-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(93, 64, 55, 0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background: rgba(156, 39, 176, 0.1);
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .option-btn.custom {
            background: rgba(0, 150, 136, 0.1);
            border-color: var(--accent-teal);
            color: var(--accent-teal);
        }

        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(93, 64, 55, 0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(93, 64, 55, 0.15);
            border-radius: 24px;
            font-size: 0.95rem;
            font-family: 'Noto Serif SC', serif;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-dark);
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--accent-purple);
        }

        .chat-send-btn {
            padding: 12px 24px;
            font-size: 0.95rem;
            color: white;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-send-btn:hover {
            transform: scale(1.05);
        }

        .chat-send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 参数面板 */
        .params-panel {
            width: 250px;
            border-left: 1px solid rgba(93, 64, 55, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .params-panel h4 {
            font-family: 'ZCOOL XiaoWei', serif;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .params-progress {
            margin-bottom: 20px;
        }

        .params-progress-bar {
            height: 8px;
            background: rgba(93, 64, 55, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .params-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .params-progress-text {
            font-size: 0.8rem;
            color: var(--text-light);
            text-align: center;
        }

        .params-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
        }

        .params-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(93, 64, 55, 0.05);
            font-size: 0.85rem;
        }

        .params-list li .field {
            color: var(--text-light);
        }

        .params-list li .value {
            color: var(--text-dark);
            font-weight: 500;
        }

        .params-list li.pending .value {
            color: var(--text-light);
            font-style: italic;
        }

        .btn-fill-params {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            font-size: 0.95rem;
            color: white;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-fill-params:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 150, 136, 0.3);
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent-purple);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .params-panel {
                display: none;
            }

            .chat-container {
                width: 95%;
                height: 90vh;
            }
        }
    </style>
</head>
<body>
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>梦境创作</h1>
            <p class="subtitle">AI 小说生成器 · 让故事自然流淌</p>
            <div class="nav-links">
                <a href="/" class="nav-link">返回首页</a>

    <script>
        let currentTaskId = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const keywordTextarea = document.getElementById('keyword');
            const keywordCount = document.getElementById('keywordCount');

            keywordTextarea.addEventListener('input', function() {
                keywordCount.textContent = this.value.length;
            });

            // 根据当前时间判断默认模型
            // Pro 模型优惠截止时间：2026/05/05 23:59 北京时间
            const promoEndTime = new Date('2026-05-05T23:59:00+08:00');
            const now = new Date();
            const aiModelSelect = document.getElementById('aiModel');

            if (now < promoEndTime) {
                // 优惠期内，默认选择 Pro
                aiModelSelect.value = 'deepseek-v4-pro';
                // 添加优惠提示
                const modelGroup = aiModelSelect.closest('.form-group');
                const promoTip = document.createElement('small');
                promoTip.style.cssText = 'display: block; margin-top: 5px; color: #4caf50; font-size: 0.8rem;';
                promoTip.textContent = '🎉 Pro 模型限时 2.5 折优惠中！';
                modelGroup.appendChild(promoTip);
            } else {
                // 优惠期后，默认选择 Flash
                aiModelSelect.value = 'deepseek-v4-flash';
            }

            // 检查是否有从历史记录传递过来的参数
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('useParams') === 'true') {
                const savedParams = localStorage.getItem('novelGeneratorParams');
                if (savedParams) {
                    try {
                        const params = JSON.parse(savedParams);

                        // 填充表单
                        if (params.chapterCount) document.getElementById('chapterCount').value = params.chapterCount;
                        if (params.keyword) {
                            document.getElementById('keyword').value = params.keyword;
                            keywordCount.textContent = params.keyword.length;
                        }
                        if (params.genre) document.getElementById('genre').value = params.genre;
                        if (params.requires) document.getElementById('requires').value = params.requires;
                        if (params.newWorld !== undefined) document.getElementById('newWorld').checked = params.newWorld;
                        if (params.roleCount) document.getElementById('roleCount').value = params.roleCount;
                        if (params.gameplay) document.getElementById('gameplay').value = params.gameplay;
                        if (params.tools) document.getElementById('tools').value = params.tools;
                        if (params.pointOfView) document.getElementById('pointOfView').value = params.pointOfView;
                        if (params.protagonist) document.getElementById('protagonist').value = params.protagonist;
                        if (params.languageStyle) document.getElementById('languageStyle').value = params.languageStyle;
                        if (params.wordsPerChapter) document.getElementById('wordsPerChapter').value = params.wordsPerChapter;

                        // 清除 URL 参数标记
                        window.history.replaceState({}, document.title, window.location.pathname);

                        // 清除 localStorage
                        localStorage.removeItem('novelGeneratorParams');

                        // 显示提示
                        alert('已加载历史参数，您可以修改后提交生成。');
                    } catch (e) {
                        console.error('解析参数失败:', e);
                    }
                }
            }
        });

        // 切换高级选项
        function toggleAdvanced() {
            const options = document.getElementById('advancedOptions');
            const arrow = document.getElementById('advancedArrow');
            options.classList.toggle('active');
            arrow.textContent = options.classList.contains('active') ? '▲' : '▼';
        }

        // 表单提交
        document.getElementById('generatorForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '正在启动...';

            const formData = {
                chapterCount: parseInt(document.getElementById('chapterCount').value),
                keyword: document.getElementById('keyword').value.trim(),
                genre: document.getElementById('genre').value.trim() || '记叙文',
                requires: document.getElementById('requires').value.trim(),
                newWorld: document.getElementById('newWorld').checked,
                roleCount: parseInt(document.getElementById('roleCount').value) || 3,
                gameplay: document.getElementById('gameplay').value.trim() || 'BDSM',
                tools: document.getElementById('tools').value.trim() || 'BDSM',
                pointOfView: document.getElementById('pointOfView').value,
                protagonist: document.getElementById('protagonist').value.trim(),
                languageStyle: document.getElementById('languageStyle').value.trim() || '直白、露骨的性虐。性爱描写',
                wordsPerChapter: parseInt(document.getElementById('wordsPerChapter').value) || 3000,
                aiModel: document.getElementById('aiModel').value
            };

            try {
                const response = await fetch('/api/novel-generator/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    currentTaskId = result.taskId;
                    showProgressSection(result.taskId);
                } else {
                    showError(result.error || '启动失败');
                    resetForm();
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
                resetForm();
            }
        });

        // 显示进度区域
        function showProgressSection(taskId) {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('errorSection').classList.remove('active');

            addLog('任务已创建，任务ID: ' + taskId);
            addLog('点击"查询进度"按钮查看最新状态');
        }

        // 查询进度（手动调用）
        async function queryProgress() {
            if (!currentTaskId) {
                showError('任务ID不存在');
                return;
            }

            const btn = document.getElementById('queryProgressBtn');
            btn.disabled = true;
            btn.textContent = '查询中...';

            try {
                const response = await fetch('/api/novel-generator/progress/' + currentTaskId);
                const progress = await response.json();

                updateProgress(progress.progress, progress.currentStep || '处理中...');

                // 添加日志
                const time = new Date().toLocaleTimeString();
                if (progress.currentStep) {
                    addLog(progress.currentStep + ' (' + progress.progress + '%)');
                }

                if (progress.status === 'COMPLETED') {
                    showResult(progress.resultNovelId, progress.resultNovelTitle);
                    addLog('创作完成！');
                } else if (progress.status === 'FAILED') {
                    showError(progress.errorMessage || '生成失败');
                } else if (progress.status === 'RUNNING') {
                    addLog('任务正在执行中...');
                } else if (progress.status === 'PENDING') {
                    addLog('任务等待中...');
                }
            } catch (e) {
                console.error('查询进度失败:', e);
                addLog('查询失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '查询进度';
            }
        }

        // 更新进度
        function updateProgress(percent, step) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressStep').textContent = step;
        }

        // 添加日志
        function addLog(message) {
            const logArea = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = '[' + time + '] ' + message;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 显示结果
        function showResult(novelId, novelTitle) {
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('resultSection').classList.add('active');
            document.getElementById('resultNovelTitle').textContent = novelTitle;
            document.getElementById('viewNovelBtn').href = '/novel/' + novelId;
        }

        // 显示错误
        function showError(message) {
            const errorSection = document.getElementById('errorSection');
            errorSection.textContent = '错误: ' + message;
            errorSection.classList.add('active');
        }

        // 重置表单
        function resetForm() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.textContent = '开始创作';
        }
    </script>

    <!-- 创作引导侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>📝 创作引导会话</h3>
            <button class="sidebar-close" onclick="toggleSidebar()">×</button>
        </div>
        <div class="sidebar-content">
            <button class="btn-new-session" onclick="createNewSession()">+ 新建会话</button>
            <div id="sessionList"></div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <!-- 创作引导对话模态框 -->
    <div class="chat-modal" id="chatModal">
        <div class="chat-container">
            <div class="chat-main">
                <div class="chat-header">
                    <h3>💬 创作引导助手</h3>
                    <button class="chat-close" onclick="closeGuidanceChat()">×</button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <!-- 消息将动态添加 -->
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入您的想法..." onkeypress="handleChatKeypress(event)">
                    <button class="chat-send-btn" id="chatSendBtn" onclick="sendChatMessage()">发送</button>
                </div>
            </div>
            <div class="params-panel">
                <h4>📝 创作参数</h4>
                <div class="params-progress">
                    <div class="params-progress-bar">
                        <div class="params-progress-fill" id="paramsProgressFill" style="width: 0%"></div>
                    </div>
                    <div class="params-progress-text" id="paramsProgressText">已完成 0%</div>
                </div>
                <ul class="params-list" id="paramsList">
                    <li class="pending"><span class="field">题材</span><span class="value">待确定</span></li>
                    <li class="pending"><span class="field">风格</span><span class="value">待确定</span></li>
                    <li class="pending"><span class="field">主角</span><span class="value">待确定</span></li>
                    <li class="pending"><span class="field">主线</span><span class="value">待确定</span></li>
                    <li class="pending"><span class="field">结局</span><span class="value">待确定</span></li>
                    <li class="pending"><span class="field">章节数</span><span class="value">8 (默认)</span></li>
                </ul>

    <script>
        // ==================== 创作引导功能 ====================
        let currentSessionId = null;
        let eventSource = null;
        let currentParams = {
            theme: null,
            style: null,
            protagonistName: null,
            protagonistGender: null,
            protagonistIdentity: null,
            mainPlot: null,
            endingType: null,
            chapterCount: 8,
            wordsPerChapter: 3000
        };

        // 字段显示名称映射
        const fieldNames = {
            theme: '题材',
            style: '风格',
            protagonistName: '主角',
            mainPlot: '主线',
            endingType: '结局',
            chapterCount: '章节数',
            wordsPerChapter: '字数/章',
            pointOfView: '视角'
        };

        // 切换侧边栏
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // 打开创作引导对话框
        async function openGuidanceChat() {
            document.getElementById('chatModal').classList.add('open');
            document.getElementById('sidebar').classList.remove('open');

            // 如果没有当前会话，创建新会话
            if (!currentSessionId) {
                await createNewSession();
            } else {
                loadSessionList();
            }
        }

        // 关闭创作引导对话框
        function closeGuidanceChat() {
            document.getElementById('chatModal').classList.remove('open');
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }

        // 创建新会话
        async function createNewSession() {
            try {
                const response = await fetch('/api/creative-sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                const result = await response.json();
                if (result.success) {
                    currentSessionId = result.sessionId;
                    document.getElementById('chatMessages').innerHTML = '';
                    addSystemMessage('您好！我是您的创作顾问，让我来帮您完善小说设定。首先，您想写什么题材的故事？');

                    // 重置参数
                    currentParams = {
                        theme: null, style: null, protagonistName: null,
                        mainPlot: null, endingType: null, chapterCount: 8
                    };
                    renderParamsPanel();

                    loadSessionList();
                }
            } catch (e) {
                console.error('创建会话失败:', e);
                alert('创建会话失败: ' + e.message);
            }
        }

        // 加载会话列表
        async function loadSessionList() {
            try {
                const response = await fetch('/api/creative-sessions');
                const result = await response.json();

                const listEl = document.getElementById('sessionList');
                listEl.innerHTML = '';

                result.sessions.forEach(session => {
                    const card = document.createElement('div');
                    card.className = 'session-card' + (session.sessionId === currentSessionId ? ' active' : '');
                    card.innerHTML = `
                        <div class="session-title">${escapeHtml(session.title)}</div>
                        <div class="session-time">${formatDateTime(session.updatedAt)} · ${session.paramsComplete}%</div>
                    `;
                    card.onclick = () => switchSession(session.sessionId);
                    listEl.appendChild(card);
                });
            } catch (e) {
                console.error('加载会话列表失败:', e);
            }
        }

        // 切换会话
        async function switchSession(sessionId) {
            try {
                const response = await fetch(`/api/creative-sessions/${sessionId}`);
                const session = await response.json();

                currentSessionId = sessionId;
                renderMessages(session.messages);
                if (session.extractedParams) {
                    currentParams = JSON.parse(session.extractedParams);
                    renderParamsPanel();
                }

                loadSessionList();
            } catch (e) {
                console.error('切换会话失败:', e);
            }
        }

        // 渲染消息历史
        function renderMessages(messagesJson) {
            const chatEl = document.getElementById('chatMessages');
            chatEl.innerHTML = '';

            try {
                const messages = JSON.parse(messagesJson);
                messages.forEach(msg => {
                    if (msg.role === 'system') return;
                    if (msg.role === 'user') {
                        addUserMessage(msg.content, false);
                    } else if (msg.role === 'assistant') {
                        addAssistantMessage(msg.content, false);
                    }
                });
            } catch (e) {
                console.error('渲染消息失败:', e);
            }

            scrollToBottom();
        }

        // 发送聊天消息
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();

            if (!content || !currentSessionId) return;

            input.value = '';
            addUserMessage(content);
            disableInput();

            try {
                // 使用 fetch 发送消息，接收 SSE 响应
                const response = await fetch(`/api/creative-sessions/${currentSessionId}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                // 创建 AI 消息容器
                let aiMessageEl = null;
                let aiContentEl = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('event:')) {
                            const eventType = line.substring(6).trim();
                            continue;
                        }

                        if (line.startsWith('data:')) {
                            const data = line.substring(5).trim();
                            if (data === '{}' || data === '[DONE]') continue;

                            try {
                                const json = JSON.parse(data);

                                if (json.text) {
                                    // 创建或更新 AI 消息
                                    if (!aiMessageEl) {
                                        aiMessageEl = document.createElement('div');
                                        aiMessageEl.className = 'message assistant';
                                        aiMessageEl.innerHTML = `
                                            <div class="message-avatar">AI</div>
                                            <div class="message-content"></div>
                                        `;
                                        aiContentEl = aiMessageEl.querySelector('.message-content');
                                        document.getElementById('chatMessages').appendChild(aiMessageEl);
                                    }
                                    aiContentEl.textContent += json.text;
                                    scrollToBottom();
                                }

                                if (json.options) {
                                    renderOptions(json.options, json.field);
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }

                enableInput();
                loadSessionList();

            } catch (e) {
                console.error('发送消息失败:', e);
                enableInput();
            }
        }

        // 渲染选项按钮
        function renderOptions(options, field) {
            const optionsEl = document.createElement('div');
            optionsEl.className = 'message-options';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (opt.value === '__custom__' ? ' custom' : '');
                btn.textContent = opt.label;
                btn.onclick = () => selectOption(field, opt.value, opt.label);
                optionsEl.appendChild(btn);
            });

            // 添加到消息区域
            const messagesEl = document.getElementById('chatMessages');
            const lastMessage = messagesEl.lastElementChild;
            if (lastMessage) {
                const contentEl = lastMessage.querySelector('.message-content');
                if (contentEl) {
                    contentEl.appendChild(optionsEl);
                }
            }

            scrollToBottom();
        }

        // 选择选项
        function selectOption(field, value, label) {
            if (value === '__custom__') {
                // 显示输入框让用户输入
                const input = document.getElementById('chatInput');
                input.focus();
                input.placeholder = label || '请输入自定义内容...';
            } else {
                // 更新参数
                currentParams[field] = value;
                renderParamsPanel();

                // 发送选择作为用户消息
                document.getElementById('chatInput').value = label || value;
                sendChatMessage();
            }
        }

        // 添加用户消息
        function addUserMessage(content, scroll = true) {
            const messagesEl = document.getElementById('chatMessages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message user';
            msgEl.innerHTML = `
                <div class="message-content">${escapeHtml(content)}</div>
                <div class="message-avatar">我</div>
            `;
            messagesEl.appendChild(msgEl);
            if (scroll) scrollToBottom();
        }

        // 添加 AI 消息
        function addAssistantMessage(content, scroll = true) {
            const messagesEl = document.getElementById('chatMessages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message assistant';
            msgEl.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesEl.appendChild(msgEl);
            if (scroll) scrollToBottom();
        }

        // 添加系统消息
        function addSystemMessage(content) {
            const messagesEl = document.getElementById('chatMessages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message assistant';
            msgEl.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesEl.appendChild(msgEl);
            scrollToBottom();
        }

        // 渲染参数面板
        function renderParamsPanel() {
            const listEl = document.getElementById('paramsList');
            listEl.innerHTML = '';

            let completed = 0;
            const total = Object.keys(fieldNames).length;

            Object.entries(fieldNames).forEach(([key, name]) => {
                const value = currentParams[key];
                const li = document.createElement('li');
                li.className = value ? '' : 'pending';
                li.innerHTML = `
                    <span class="field">${name}</span>
                    <span class="value">${value || '待确定'}</span>
                `;
                listEl.appendChild(li);
                if (value) completed++;
            });

            const progress = Math.round((completed / total) * 100);
            document.getElementById('paramsProgressFill').style.width = progress + '%';
            document.getElementById('paramsProgressText').textContent = `已完成 ${progress}%`;
        }

        // 填充参数到表单
        async function fillParamsToForm() {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`/api/creative-sessions/${currentSessionId}/fill-params`, {
                    method: 'POST'
                });

                const result = await response.json();
                if (result.success && result.request) {
                    // 填充表单
                    const req = result.request;
                    if (req.chapterCount) document.getElementById('chapterCount').value = req.chapterCount;
                    if (req.keyword) {
                        document.getElementById('keyword').value = req.keyword;
                        document.getElementById('keywordCount').textContent = req.keyword.length;
                    }
                    if (req.genre) document.getElementById('genre').value = req.genre;
                    if (req.protagonist) document.getElementById('protagonist').value = req.protagonist;
                    if (req.languageStyle) document.getElementById('languageStyle').value = req.languageStyle;
                    if (req.wordsPerChapter) document.getElementById('wordsPerChapter').value = req.wordsPerChapter;
                    if (req.pointOfView) document.getElementById('pointOfView').value = req.pointOfView;

                    // 关闭对话框
                    closeGuidanceChat();

                    // 显示提示
                    alert('参数已填充到表单，您可以修改后提交生成。');
                }
            } catch (e) {
                console.error('填充参数失败:', e);
                alert('填充参数失败: ' + e.message);
            }
        }

        // 键盘事件处理
        function handleChatKeypress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendChatMessage();
            }
        }

        // 禁用输入
        function disableInput() {
            document.getElementById('chatInput').disabled = true;
            document.getElementById('chatSendBtn').disabled = true;
        }

        // 启用输入
        function enableInput() {
            document.getElementById('chatInput').disabled = false;
            document.getElementById('chatSendBtn').disabled = false;
            document.getElementById('chatInput').focus();
        }

        // 滚动到底部
        function scrollToBottom() {
            const el = document.getElementById('chatMessages');
            el.scrollTop = el.scrollHeight;
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString().substring(0, 5);
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
