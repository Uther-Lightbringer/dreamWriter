    <script>
        // ==================== 创作引导功能 ====================
        let currentSessionId = null;
        let eventSource = null;
        let currentParams = {
            theme: null,
            style: null,
            protagonistName: null,
            protagonistGender: null,
            protagonistIdentity: null,
            mainPlot: null,
            endingType: null,
            chapterCount: 8,
            wordsPerChapter: 3000
        };

        // 字段显示名称映射
        const fieldNames = {
            // 题材风格
            theme: '题材',
            style: '风格',
            genre: '类型',

            // 主角相关
            protagonistName: '主角姓名',
            protagonistGender: '主角性别',
            protagonistIdentity: '主角身份',
            protagonistAge: '主角年龄',
            protagonistMajor: '主角专业',

            // 其他角色
            secondProtagonistName: '第二主角姓名',
            antagonistName: '反派姓名',

            // 剧情相关
            mainPlot: '主线',
            conflictType: '冲突类型',
            endingType: '结局',

            // 细节参数
            chapterCount: '章节数',
            wordsPerChapter: '字数/章',
            pointOfView: '视角',
            languageStyle: '语言风格',

            // 其他
            setting: '背景设定',
            relationship: '人物关系',
            tone: '基调',
            age: '年龄',
            major: '专业',
            profession: '职业',
            name: '姓名'
        };

        // 待确认的选择（批量模式）
        let pendingSelections = {};
        // 当前消息ID（用于追踪批量选择）
        let currentMessageId = null;

        // 切换侧边栏
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // 打开创作引导对话框
        async function openGuidanceChat() {
            document.getElementById('chatModal').classList.add('open');
            document.getElementById('sidebar').classList.remove('open');

            // 如果没有当前会话，创建新会话
            if (!currentSessionId) {
                await createNewSession();
            } else {
                loadSessionList();
            }
        }

        // 关闭创作引导对话框
        function closeGuidanceChat() {
            document.getElementById('chatModal').classList.remove('open');
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }

        // 创建新会话
        async function createNewSession() {
            try {
                const response = await fetch('/api/creative-sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                const result = await response.json();
                if (result.success) {
                    currentSessionId = result.sessionId;
                    document.getElementById('chatMessages').innerHTML = '';
                    addSystemMessage('您好！我是您的创作顾问，让我来帮您完善小说设定。首先，您想写什么题材的故事？');

                    // 重置参数
                    currentParams = {
                        theme: null, style: null, protagonistName: null,
                        mainPlot: null, endingType: null, chapterCount: 8
                    };
                    renderParamsPanel();

                    loadSessionList();
                }
            } catch (e) {
                console.error('创建会话失败:', e);
                alert('创建会话失败: ' + e.message);
            }
        }

        // 加载会话列表
        async function loadSessionList() {
            try {
                const response = await fetch('/api/creative-sessions');
                const result = await response.json();

                const listEl = document.getElementById('sessionList');
                listEl.innerHTML = '';

                result.sessions.forEach(session => {
                    const card = document.createElement('div');
                    card.className = 'session-card' + (session.sessionId === currentSessionId ? ' active' : '');
                    card.innerHTML = `
                        <div class="session-title">${escapeHtml(session.title)}</div>
                        <div class="session-time">${formatDateTime(session.updatedAt)} · ${session.paramsComplete}%</div>
                    `;
                    card.onclick = () => switchSession(session.sessionId);
                    listEl.appendChild(card);
                });
            } catch (e) {
                console.error('加载会话列表失败:', e);
            }
        }

        // 切换会话
        async function switchSession(sessionId) {
            try {
                const response = await fetch(`/api/creative-sessions/${sessionId}`);
                const session = await response.json();

                currentSessionId = sessionId;
                renderMessages(session.messages);
                if (session.extractedParams) {
                    currentParams = JSON.parse(session.extractedParams);
                    renderParamsPanel();
                }

                loadSessionList();
            } catch (e) {
                console.error('切换会话失败:', e);
            }
        }

        // 渲染消息历史
        function renderMessages(messagesJson) {
            const chatEl = document.getElementById('chatMessages');
            chatEl.innerHTML = '';

            try {
                const messages = JSON.parse(messagesJson);
                messages.forEach(msg => {
                    if (msg.role === 'system') return;
                    if (msg.role === 'user') {
                        addUserMessage(msg.content, false);
                    } else if (msg.role === 'assistant') {
                        addAssistantMessage(msg.content, false);
                    }
                });
            } catch (e) {
                console.error('渲染消息失败:', e);
            }

            scrollToBottom();
        }

        // 发送聊天消息
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();

            if (!content || !currentSessionId) return;

            input.value = '';
            addUserMessage(content);
            disableInput();

            // 显示"正在思考"气泡
            const thinkingEl = addThinkingMessage();

            // 获取运行时配置
            const runtimeConfig = getRuntimeConfig();

            try {
                // 使用 fetch 发送消息，接收 SSE 响应
                const response = await fetch(`/api/creative-sessions/${currentSessionId}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: content,
                        config: runtimeConfig
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullResponse = '';
                let currentEventType = 'content'; // 默认事件类型
                let currentUsage = null; // 存储 usage 信息
                let aiMessageEl = null; // AI消息元素

                // 创建 AI 消息容器
                let aiMessageEl = null;
                let aiContentEl = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];

                        if (line.startsWith('event:')) {
                            currentEventType = line.substring(6).trim();
                            continue;
                        }

                        if (line.startsWith('data:')) {
                            const data = line.substring(5).trim();
                            if (data === '{}' || data === '[DONE]') continue;

                            try {
                                const json = JSON.parse(data);

                                // 根据事件类型处理
                                if (currentEventType === 'tool_result') {
                                    handleToolResult(json);
                                } else if (currentEventType === 'image_result') {
                                    handleImageResult(json);
                                } else if (currentEventType === 'error') {
                                    showNotification(json.message || '发生错误', 'error');
                                    removeThinkingMessage(thinkingEl);
                                } else if (currentEventType === 'usage') {
                                    // 存储 usage 信息
                                    currentUsage = json;
                                } else if (currentEventType === 'content' || currentEventType === 'done') {
                                    // 处理内容事件
                                    if (json.text && json.text !== 'null' && json.text !== null) {
                                        fullResponse += json.text;

                                        // 收到第一个内容时，移除 thinking 气泡
                                        if (thinkingEl) {
                                            removeThinkingMessage(thinkingEl);
                                            thinkingEl = null;
                                        }

                                        // 创建或更新 AI 消息
                                        if (!aiMessageEl) {
                                            aiMessageEl = document.createElement('div');
                                            aiMessageEl.className = 'message assistant';
                                            aiMessageEl.innerHTML = `
                                                <div class="message-avatar">AI</div>
                                                <div class="message-content"></div>
                                            `;
                                            aiContentEl = aiMessageEl.querySelector('.message-content');
                                            document.getElementById('chatMessages').appendChild(aiMessageEl);
                                        }

                                        // 实时显示原始文本（流式效果）
                                        aiContentEl.textContent = fullResponse;
                                        scrollToBottom();
                                    }
                                }

                                // 重置事件类型
                                currentEventType = 'content';
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }

                // 流式响应完成后，解析标记并渲染 Markdown
                if (aiContentEl && fullResponse) {
                    renderAIMessage(aiContentEl, fullResponse);
                }

                // 添加 token 用量标识
                if (aiMessageEl && currentUsage) {
                    addUsageIndicator(aiMessageEl, currentUsage);
                }

                // 确保 thinking 气泡被移除
                if (thinkingEl) {
                    removeThinkingMessage(thinkingEl);
                }

                enableInput();
                loadSessionList();

            } catch (e) {
                console.error('发送消息失败:', e);
                enableInput();
            }
        }

        // 添加 token 用量标识
        function addUsageIndicator(messageEl, usage) {
            const totalTokens = usage.total_tokens || 0;
            if (totalTokens === 0) return;

            // 创建标识容器
            const indicator = document.createElement('div');
            indicator.className = 'token-indicator';
            indicator.innerHTML = `<span class="token-count">${totalTokens}</span> tokens`;

            // 点击显示详情
            indicator.onclick = (e) => {
                e.stopPropagation();
                showUsageDetail(usage, indicator);
            };

            // 添加到消息内容区域
            const contentEl = messageEl.querySelector('.message-content');
            if (contentEl) {
                contentEl.appendChild(indicator);
            }
        }

        // 显示 token 用量详情
        function showUsageDetail(usage, anchorEl) {
            // 移除已存在的详情框
            const existing = document.querySelector('.usage-detail-popup');
            if (existing) existing.remove();

            // 创建详情框
            const popup = document.createElement('div');
            popup.className = 'usage-detail-popup';

            const promptTokens = usage.prompt_tokens || 0;
            const completionTokens = usage.completion_tokens || 0;
            const totalTokens = usage.total_tokens || 0;
            const cacheHit = usage.prompt_cache_hit_tokens || 0;
            const cacheMiss = usage.prompt_cache_miss_tokens || 0;
            const reasoningTokens = usage.completion_tokens_details?.reasoning_tokens || 0;

            popup.innerHTML = `
                <div class="usage-header">Token 用量详情</div>
                <div class="usage-row">
                    <span>输入 tokens</span>
                    <span>${promptTokens.toLocaleString()}</span>
                </div>
                <div class="usage-row">
                    <span>输出 tokens</span>
                    <span>${completionTokens.toLocaleString()}</span>
                </div>
                <div class="usage-row total">
                    <span>总计</span>
                    <span>${totalTokens.toLocaleString()}</span>
                </div>
                ${cacheHit > 0 ? `
                <div class="usage-divider"></div>
                <div class="usage-row cached">
                    <span>缓存命中</span>
                    <span>${cacheHit.toLocaleString()}</span>
                </div>
                <div class="usage-row">
                    <span>缓存未命中</span>
                    <span>${cacheMiss.toLocaleString()}</span>
                </div>
                ` : ''}
                ${reasoningTokens > 0 ? `
                <div class="usage-divider"></div>
                <div class="usage-row">
                    <span>推理 tokens</span>
                    <span>${reasoningTokens.toLocaleString()}</span>
                </div>
                ` : ''}
            `;

            // 定位到锚点元素附近
            const rect = anchorEl.getBoundingClientRect();
            const chatMessages = document.getElementById('chatMessages');
            const chatRect = chatMessages.getBoundingClientRect();

            // 使用 fixed 定位，相对于视口
            popup.style.position = 'fixed';
            popup.style.right = (window.innerWidth - rect.right) + 'px';
            popup.style.bottom = (window.innerHeight - rect.top + 5) + 'px';

            document.body.appendChild(popup);

            // 点击其他地方关闭
            const closePopup = (e) => {
                if (!popup.contains(e.target) && e.target !== anchorEl) {
                    popup.remove();
                    document.removeEventListener('click', closePopup);
                }
            };
            setTimeout(() => document.addEventListener('click', closePopup), 10);
        }

        // 处理工具结果事件
        function handleToolResult(json) {
            const toolName = json.tool;
            const result = json.result;

            if (typeof result === 'string') {
                try {
                    const resultObj = JSON.parse(result);

                    if (toolName === 'fill_params' && resultObj.success) {
                        // 更新参数面板
                        if (resultObj.params) {
                            currentParams = resultObj.params;
                            renderParamsPanel();
                        }
                        // 显示更新通知
                        if (resultObj.updated && Object.keys(resultObj.updated).length > 0) {
                            const updatedFields = Object.keys(resultObj.updated).map(f => fieldNames[f] || f).join('、');
                            showNotification(`已更新：${updatedFields}`, 'success');
                        }
                    } else if (toolName === 'add_memory' && resultObj.success) {
                        showNotification(resultObj.message || '已添加到个人偏好', 'success');
                    } else if (toolName === 'remove_memory' && resultObj.success) {
                        showNotification(resultObj.message || '已删除记忆', 'info');
                    } else if (resultObj.error) {
                        showNotification('操作失败: ' + resultObj.error, 'error');
                    }
                } catch (e) {
                    // 忽略解析错误
                }
            }
        }

        // 处理图片结果事件
        function handleImageResult(data) {
            const messagesEl = document.getElementById('chatMessages');

            // 创建图片消息元素
            const imageEl = document.createElement('div');
            imageEl.className = 'message assistant image-message';

            const typeText = data.type === 'character' ? `角色：${data.name || '未知'}` : '章节配图';

            imageEl.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="generated-image-card">
                        <img src="${data.imageUrl}" alt="${data.name || 'Generated Image'}"
                             onclick="viewImageFullscreen('${data.imageUrl}')"
                             class="generated-image-thumb"
                             onerror="this.src='/images/placeholder.png'"/>
                        <div class="image-info">${typeText}</div>
                        <div class="image-actions">
                            <button onclick="downloadImage('${data.imageUrl}', '${data.name || 'image'}')" class="btn-download-image">下载</button>
                        </div>
                    </div>
                </div>
            `;

            messagesEl.appendChild(imageEl);
            scrollToBottom();
        }

        // 下载图片
        function downloadImage(url, name) {
            const a = document.createElement('a');
            a.href = url;
            a.download = (name || 'image') + '.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // 全屏查看图片
        function viewImageFullscreen(url) {
            const overlay = document.createElement('div');
            overlay.className = 'image-fullscreen-overlay';
            overlay.onclick = () => overlay.remove();
            overlay.innerHTML = `
                <div class="image-fullscreen-content">
                    <img src="${url}" alt="Full size image"/>
                    <button class="close-fullscreen" onclick="this.parentElement.parentElement.remove()">×</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        // 显示通知
        function showNotification(message, type = 'info') {
            // 移除已有通知
            const existing = document.querySelector('.chat-notification');
            if (existing) existing.remove();

            const notification = document.createElement('div');
            notification.className = 'chat-notification ' + type;
            notification.innerHTML = `
                <span class="notification-icon">${type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ'}</span>
                <span class="notification-text">${escapeHtml(message)}</span>
            `;

            const chatMessages = document.getElementById('chatMessages');
            chatMessages.appendChild(notification);

            // 3秒后自动消失
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 3000);

            scrollToBottom();
        }

        // 渲染 AI 消息（解析标记 + Markdown + 智能选择模式）
        function renderAIMessage(contentEl, text) {
            // 生成唯一消息ID
            currentMessageId = 'msg_' + Date.now();
            pendingSelections = {};

            // 1. 提取 [OPTIONS:字段名:显示名称] 标记格式的选项
            // 支持两种格式：
            // - 新格式：[OPTIONS:field:显示名]选项1|选项2[/OPTIONS]
            // - 旧格式：[OPTIONS:field]选项1|选项2[/OPTIONS]（兼容）
            const optionsRegex = /\[OPTIONS:(\w+)(?::([^\]]+))?\]([\s\S]*?)\[\/OPTIONS\]/g;
            const taggedOptions = [];
            let optionsMatch;

            while ((optionsMatch = optionsRegex.exec(text)) !== null) {
                const field = optionsMatch[1];
                const displayName = optionsMatch[2] || null; // 中文显示名（可选）
                const optionsStr = optionsMatch[3].trim();
                const options = optionsStr.split('|').map(opt => {
                    opt = opt.trim();
                    return { label: opt, value: opt, field };
                });
                taggedOptions.push({ field, displayName, options });
            }

            // 2. 清理标记，准备 Markdown 渲染
            let cleanText = text.replace(optionsRegex, '').trim();

            // 3. 尝试识别 Markdown 列表选项（如果没有标记格式）
            const markdownOptions = [];
            if (taggedOptions.length === 0) {
                const listOptions = parseMarkdownOptions(cleanText);
                markdownOptions.push(...listOptions);
            }

            // 合并所有选项
            const allOptions = [...taggedOptions, ...markdownOptions];

            // 4. 渲染 Markdown
            if (typeof marked !== 'undefined') {
                contentEl.innerHTML = marked.parse(cleanText);
            } else {
                contentEl.innerHTML = cleanText.replace(/\n/g, '<br>');
            }

            // 5. 决定选择模式
            const isBatchMode = allOptions.length > 1;

            // 6. 渲染选项
            if (allOptions.length > 0) {
                const optionsContainer = document.createElement('div');
                optionsContainer.className = 'options-container';
                optionsContainer.dataset.messageId = currentMessageId;

                allOptions.forEach(({ field, displayName, options }) => {
                    const fieldContainer = document.createElement('div');
                    fieldContainer.className = 'option-field';
                    fieldContainer.dataset.field = field;

                    // 字段标签：优先使用 AI 提供的 displayName
                    // 如果没有 displayName，尝试从 fieldNames 映射中查找
                    let label = displayName;
                    if (!label) {
                        const baseField = field.replace(/\d+$/, '');
                        label = fieldNames[field] || fieldNames[baseField];
                    }

                    // 存储 displayName 到容器，供后续使用
                    if (label) {
                        fieldContainer.dataset.displayName = label;
                    }

                    // 只有找到中文标签时才显示
                    if (label) {
                        const fieldLabel = document.createElement('div');
                        fieldLabel.className = 'option-field-label';
                        fieldLabel.textContent = label;
                        fieldContainer.appendChild(fieldLabel);
                    }

                    // 选项按钮
                    const buttonsContainer = document.createElement('div');
                    buttonsContainer.className = 'option-buttons';

                    options.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn' + (opt.value === '__custom__' ? ' custom' : '');
                        btn.textContent = opt.label;
                        btn.dataset.value = opt.value;
                        btn.dataset.field = field;
                        btn.dataset.label = opt.label;
                        if (opt.hint) btn.dataset.hint = opt.hint;

                        btn.onclick = () => handleOptionClick(btn, field, opt.value, opt.label, isBatchMode);
                        buttonsContainer.appendChild(btn);
                    });

                    fieldContainer.appendChild(buttonsContainer);

                    // 每个字段下方都添加一个自定义输入框
                    const customInputContainer = document.createElement('div');
                    customInputContainer.className = 'custom-input-container';

                    const customInput = document.createElement('input');
                    customInput.type = 'text';
                    customInput.className = 'custom-option-input';
                    customInput.placeholder = '或直接输入自定义内容...';
                    customInput.dataset.field = field;

                    // 输入框回车确认
                    customInput.onkeydown = (e) => {
                        if (e.key === 'Enter' && customInput.value.trim()) {
                            handleCustomInput(customInput, field, isBatchMode);
                        }
                    };

                    // 输入框失焦也确认（批量模式）
                    customInput.onblur = () => {
                        if (customInput.value.trim() && isBatchMode) {
                            handleCustomInput(customInput, field, isBatchMode);
                        }
                    };

                    customInputContainer.appendChild(customInput);
                    fieldContainer.appendChild(customInputContainer);

                    optionsContainer.appendChild(fieldContainer);
                });

                // 批量模式：添加确认按钮
                if (isBatchMode) {
                    const confirmBtn = document.createElement('button');
                    confirmBtn.className = 'confirm-selections-btn';
                    confirmBtn.id = 'confirmBtn_' + currentMessageId;
                    confirmBtn.textContent = '确认发送 (0/' + allOptions.length + ')';
                    confirmBtn.disabled = true;
                    confirmBtn.onclick = () => confirmAndSendSelections(allOptions.length);
                    optionsContainer.appendChild(confirmBtn);

                    // 跳过链接
                    const skipLink = document.createElement('div');
                    skipLink.className = 'skip-link';
                    skipLink.innerHTML = '<a href="javascript:void(0)" onclick="skipSelections()">跳过，直接输入...</a>';
                    optionsContainer.appendChild(skipLink);
                }

                contentEl.appendChild(optionsContainer);
            }

            scrollToBottom();
        }

        // 解析 Markdown 列表选项
        function parseMarkdownOptions(text) {
            const options = [];
            const lines = text.split('\n');

            let currentField = null;
            let currentOptions = [];
            let inOptionsSection = false;

            // 字段名关键词映射
            const fieldKeywords = {
                '题材': 'theme', '风格': 'style', '性别': 'protagonistGender',
                '主角': 'protagonistName', '身份': 'protagonistIdentity',
                '结局': 'endingType', '视角': 'pointOfView', '语言': 'languageStyle'
            };

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                // 检测问题行（包含问号或字段关键词）
                if (line.includes('？') || line.includes('?')) {
                    // 保存之前的选项组
                    if (currentField && currentOptions.length > 0) {
                        options.push({ field: currentField, options: currentOptions });
                    }

                    // 查找字段名
                    currentField = null;
                    for (const [keyword, fieldName] of Object.entries(fieldKeywords)) {
                        if (line.includes(keyword)) {
                            currentField = fieldName;
                            break;
                        }
                    }

                    currentOptions = [];
                    inOptionsSection = true;
                    continue;
                }

                // 检测列表项
                if (inOptionsSection && (line.startsWith('- ') || line.startsWith('* ') || line.match(/^\d+\.\s/))) {
                    const optionText = line.replace(/^[-*\d.]\s*/, '').trim();

                    // 跳过"其他"选项在 Markdown 中（让用户直接输入）
                    if (optionText.startsWith('其他') || optionText.startsWith('自定义')) {
                        currentOptions.push({
                            label: optionText.split(/[:：]/)[0].trim(),
                            value: '__custom__',
                            hint: optionText.split(/[:：]/)[1]?.trim() || '请输入自定义内容',
                            field: currentField
                        });
                    } else {
                        currentOptions.push({
                            label: optionText,
                            value: optionText,
                            field: currentField
                        });
                    }
                    continue;
                }

                // 非列表行，结束选项区域
                if (line && !line.startsWith('-') && !line.startsWith('*') && !line.match(/^\d+\./)) {
                    if (currentField && currentOptions.length > 0) {
                        options.push({ field: currentField, options: currentOptions });
                    }
                    currentField = null;
                    currentOptions = [];
                    inOptionsSection = false;
                }
            }

            // 保存最后一组
            if (currentField && currentOptions.length > 0) {
                options.push({ field: currentField, options: currentOptions });
            }

            return options;
        }

        // 处理自定义输入
        function handleCustomInput(input, field, isBatchMode) {
            const value = input.value.trim();
            if (!value) return;

            if (isBatchMode) {
                // 批量模式：暂存自定义输入，包含 displayName
                const fieldContainer = input.closest('.option-field');
                const displayName = fieldContainer.dataset.displayName || null;
                pendingSelections[field] = { value, label: value, displayName };

                // 清除该字段所有选项按钮的选中状态
                fieldContainer.querySelectorAll('.option-btn').forEach(b => {
                    b.classList.remove('selected');
                });

                // 显示已选状态
                let statusEl = fieldContainer.querySelector('.selection-status');
                if (!statusEl) {
                    statusEl = document.createElement('div');
                    statusEl.className = 'selection-status';
                    fieldContainer.appendChild(statusEl);
                }
                statusEl.textContent = '✓ 已输入：' + value;

                // 更新确认按钮
                updateConfirmButton();

                // 标记输入框为已确认
                input.classList.add('confirmed');
            } else {
                // 单选模式：直接发送
                sendMessage(value);
            }
        }

        // 处理选项点击
        function handleOptionClick(btn, field, value, label, isBatchMode) {
            const fieldContainer = btn.closest('.option-field');

            // 清除该字段的自定义输入框内容（因为用户选择了预设选项）
            const customInput = fieldContainer.querySelector('.custom-option-input');
            if (customInput) {
                customInput.value = '';
                customInput.classList.remove('confirmed');
            }

            // 更新状态显示
            let statusEl = fieldContainer.querySelector('.selection-status');
            if (statusEl && statusEl.textContent.includes('已输入')) {
                statusEl.remove();
                statusEl = null;
            }

            if (isBatchMode) {
                // 批量模式：暂存选择，包含 displayName
                const displayName = fieldContainer.dataset.displayName || null;
                pendingSelections[field] = { value, label, displayName };

                // 更新按钮状态
                const fieldContainer = btn.closest('.option-field');
                fieldContainer.querySelectorAll('.option-btn').forEach(b => {
                    b.classList.remove('selected');
                });
                btn.classList.add('selected');

                // 显示已选状态
                let statusEl = fieldContainer.querySelector('.selection-status');
                if (!statusEl) {
                    statusEl = document.createElement('div');
                    statusEl.className = 'selection-status';
                    fieldContainer.appendChild(statusEl);
                }
                statusEl.textContent = '✓ 已选：' + label;

                // 更新确认按钮
                updateConfirmButton();
            } else {
                // 单问题模式：直接发送
                currentParams[field] = value;
                renderParamsPanel();

                document.getElementById('chatInput').value = label;
                sendChatMessage();
            }
        }

        // 更新确认按钮状态
        function updateConfirmButton() {
            const confirmBtn = document.getElementById('confirmBtn_' + currentMessageId);
            if (!confirmBtn) return;

            const selectedCount = Object.keys(pendingSelections).length;
            const totalFields = document.querySelectorAll('.options-container[data-message-id="' + currentMessageId + '"] .option-field').length;

            confirmBtn.textContent = '确认发送 (' + selectedCount + '/' + totalFields + ')';
            confirmBtn.disabled = selectedCount === 0;

            if (selectedCount > 0) {
                confirmBtn.classList.add('has-selections');
            } else {
                confirmBtn.classList.remove('has-selections');
            }
        }

        // 确认并发送选择
        function confirmAndSendSelections(totalFields) {
            const selections = Object.entries(pendingSelections);
            if (selections.length === 0) return;

            // 更新参数
            selections.forEach(([field, { value }]) => {
                currentParams[field] = value;
            });
            renderParamsPanel();

            // 构建发送内容
            const messages = selections.map(([field, { label, displayName }]) => {
                // 优先使用 AI 提供的 displayName，否则尝试从映射表查找
                let fieldName = displayName;
                if (!fieldName) {
                    const baseField = field.replace(/\d+$/, '');
                    fieldName = fieldNames[field] || fieldNames[baseField];
                }
                // 如果找到中文名则显示，否则只显示值
                return fieldName ? fieldName + '：' + label : label;
            });

            // 发送消息
            document.getElementById('chatInput').value = messages.join('；');
            pendingSelections = {};
            sendChatMessage();
        }

        // 跳过选择
        function skipSelections() {
            pendingSelections = {};
            document.getElementById('chatInput').focus();
        }

        // 添加用户消息
        function addUserMessage(content, scroll = true) {
            const messagesEl = document.getElementById('chatMessages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message user';
            msgEl.innerHTML = `
                <div class="message-content">${escapeHtml(content)}</div>
                <div class="message-avatar">我</div>
            `;
            messagesEl.appendChild(msgEl);
            if (scroll) scrollToBottom();
        }

        // 添加"正在思考"消息
        function addThinkingMessage() {
            const messagesEl = document.getElementById('chatMessages');
            const thinkingEl = document.createElement('div');
            thinkingEl.className = 'message assistant thinking';
            thinkingEl.id = 'thinking-message';
            thinkingEl.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="thinking-indicator">
                        <span class="thinking-dot"></span>
                        <span class="thinking-dot"></span>
                        <span class="thinking-dot"></span>
                        <span class="thinking-text">正在思考</span>
                    </div>
                </div>
            `;
            messagesEl.appendChild(thinkingEl);
            scrollToBottom();
            return thinkingEl;
        }

        // 移除"正在思考"消息
        function removeThinkingMessage(thinkingEl) {
            if (thinkingEl && thinkingEl.parentNode) {
                thinkingEl.parentNode.removeChild(thinkingEl);
            }
        }

        // 添加 AI 消息
        function addAssistantMessage(content, scroll = true) {
            const messagesEl = document.getElementById('chatMessages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message assistant';
            msgEl.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesEl.appendChild(msgEl);
            if (scroll) scrollToBottom();
        }

        // 添加系统消息
        function addSystemMessage(content) {
            const messagesEl = document.getElementById('chatMessages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message assistant';
            msgEl.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesEl.appendChild(msgEl);
            scrollToBottom();
        }

        // 渲染参数面板
        function renderParamsPanel() {
            const listEl = document.getElementById('paramsList');
            listEl.innerHTML = '';

            let completed = 0;
            const total = Object.keys(fieldNames).length;

            Object.entries(fieldNames).forEach(([key, name]) => {
                const value = currentParams[key];
                const li = document.createElement('li');
                li.className = value ? '' : 'pending';
                li.innerHTML = `
                    <span class="field">${name}</span>
                    <span class="value">${value || '待确定'}</span>
                `;
                listEl.appendChild(li);
                if (value) completed++;
            });

            const progress = Math.round((completed / total) * 100);
            document.getElementById('paramsProgressFill').style.width = progress + '%';
            document.getElementById('paramsProgressText').textContent = `已完成 ${progress}%`;
        }

        // 填充参数到表单
        async function fillParamsToForm() {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`/api/creative-sessions/${currentSessionId}/fill-params`, {
                    method: 'POST'
                });

                const result = await response.json();
                if (result.success && result.request) {
                    // 填充表单
                    const req = result.request;
                    if (req.chapterCount) document.getElementById('chapterCount').value = req.chapterCount;
                    if (req.keyword) {
                        document.getElementById('keyword').value = req.keyword;
                        document.getElementById('keywordCount').textContent = req.keyword.length;
                    }
                    if (req.genre) document.getElementById('genre').value = req.genre;
                    if (req.protagonist) document.getElementById('protagonist').value = req.protagonist;
                    if (req.languageStyle) document.getElementById('languageStyle').value = req.languageStyle;
                    if (req.wordsPerChapter) document.getElementById('wordsPerChapter').value = req.wordsPerChapter;
                    if (req.pointOfView) document.getElementById('pointOfView').value = req.pointOfView;

                    // 关闭对话框
                    closeGuidanceChat();

                    // 显示提示
                    alert('参数已填充到表单，您可以修改后提交生成。');
                }
            } catch (e) {
                console.error('填充参数失败:', e);
                alert('填充参数失败: ' + e.message);
            }
        }

        // 键盘事件处理
        function handleChatKeypress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendChatMessage();
            }
        }

        // 禁用输入
        function disableInput() {
            document.getElementById('chatInput').disabled = true;
            document.getElementById('chatSendBtn').disabled = true;
        }

        // 启用输入
        function enableInput() {
            document.getElementById('chatInput').disabled = false;
            document.getElementById('chatSendBtn').disabled = false;
            document.getElementById('chatInput').focus();
        }

        // 滚动到底部
        function scrollToBottom() {
            const el = document.getElementById('chatMessages');
            el.scrollTop = el.scrollHeight;
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString().substring(0, 5);
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 配置切换功能 ====================

        // 默认配置（从服务器加载）
        let defaultConfig = {
            model: 'deepseek-v4-pro',
            thinkingEnabled: true,
            reasoningEffort: 'high'
        };

        // 加载默认配置
        async function loadDefaultConfig() {
            try {
                const response = await fetch('/api/deepseek-config/CREATIVE_GUIDANCE');
                if (response.ok) {
                    const config = await response.json();
                    defaultConfig = {
                        model: config.model,
                        thinkingEnabled: config.thinkingEnabled,
                        reasoningEffort: config.reasoningEffort
                    };
                    resetRuntimeConfig();
                }
            } catch (e) {
                console.error('加载默认配置失败:', e);
            }
        }

        // 切换配置面板
        function toggleConfigPanel() {
            const panel = document.getElementById('configPanel');
            panel.classList.toggle('show');
        }

        // 更新配置状态
        function updateConfigStatus() {
            const model = document.getElementById('configModel').value;
            const thinking = document.getElementById('configThinking').value === 'true';
            const effortRow = document.getElementById('effortRow');

            // 显示/隐藏推理强度选项
            effortRow.style.display = thinking ? 'flex' : 'none';

            // 检查是否与默认配置不同
            const isCustomized = model !== defaultConfig.model ||
                                  thinking !== defaultConfig.thinkingEnabled ||
                                  (thinking && document.getElementById('configEffort').value !== defaultConfig.reasoningEffort);

            const statusEl = document.getElementById('configStatus');
            const btn = document.getElementById('configToggleBtn');

            if (isCustomized) {
                statusEl.textContent = '已自定义';
                btn.classList.add('customized');
            } else {
                statusEl.textContent = '默认配置';
                btn.classList.remove('customized');
            }
        }

        // 获取当前运行时配置
        function getRuntimeConfig() {
            const model = document.getElementById('configModel').value;
            const thinking = document.getElementById('configThinking').value === 'true';
            const effort = document.getElementById('configEffort').value;

            // 如果是默认配置，返回 null（让后端使用默认值）
            if (model === defaultConfig.model &&
                thinking === defaultConfig.thinkingEnabled &&
                (!thinking || effort === defaultConfig.reasoningEffort)) {
                return null;
            }

            return {
                model: model,
                thinkingEnabled: thinking,
                reasoningEffort: thinking ? effort : 'high'
            };
        }

        // 重置为默认配置
        function resetRuntimeConfig() {
            document.getElementById('configModel').value = defaultConfig.model;
            document.getElementById('configThinking').value = defaultConfig.thinkingEnabled.toString();
            document.getElementById('configEffort').value = defaultConfig.reasoningEffort;

            const effortRow = document.getElementById('effortRow');
            effortRow.style.display = defaultConfig.thinkingEnabled ? 'flex' : 'none';

            updateConfigStatus();
        }

        // 点击其他地方关闭配置面板
        document.addEventListener('click', function(e) {
            const panel = document.getElementById('configPanel');
            const btn = document.getElementById('configToggleBtn');

            if (panel && btn && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.remove('show');
            }
        });

        // 页面加载时获取默认配置
        loadDefaultConfig();
    </script>
</body>
</html>
