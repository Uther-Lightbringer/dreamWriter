<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 绘画创作 - 小说收藏系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            resize: vertical;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #f5576c;
        }
        
        .size-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .size-option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
        }
        
        .size-option:hover {
            border-color: #f5576c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.2);
        }
        
        .size-option.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-color: transparent;
        }
        
        .custom-size-input {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .custom-size-input input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }
        
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        
        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            margin-top: 40px;
            display: none;
        }
        
        .status-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #3498db;
            margin-bottom: 25px;
        }
        
        .status-text {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .progress-container {
            background: #e0e0e0;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            width: 0%;
            transition: width 0.5s ease;
        }
        
        .progress-text {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .image-result {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .image-result img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .error-box {
            background: #fee;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #e74c3c;
            color: #c0392b;
            margin-bottom: 20px;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #95a5a6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #7f8c8d;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .size-selector {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI 绘画创作</h1>
            <p>输入描述，让 AI 为你绘制精美的图片</p>
        </div>
        
        <div class="content">
            <!-- 提示词输入 -->
            <div class="form-group">
                <label for="prompt">图片描述</label>
                <textarea id="prompt" placeholder="请详细描述你想要的画面，例如：一只可爱的猫咪在阳光下玩耍，毛茸茸的，大眼睛，背景是温馨的房间..." oninput="updateCharacterCount('prompt', 'promptCount')"></textarea>
                <div class="character-count" id="promptCount" style="text-align: right; font-size: 12px; color: #666; margin-top: 4px;">0/2000</div>
            </div>
            
            <!-- 尺寸选择 -->
            <div class="form-group">
                <label>图片尺寸</label>
                <div class="size-selector" id="sizeSelector">
                    <div class="size-option selected" data-value="16:9">
                        <div style="font-size: 24px; margin-bottom: 5px;">📺</div>
                        <div>16:9</div>
                        <div style="font-size: 12px; opacity: 0.7;">宽屏</div>
                    </div>
                    <div class="size-option" data-value="9:16">
                        <div style="font-size: 24px; margin-bottom: 5px;">📱</div>
                        <div>9:16</div>
                        <div style="font-size: 12px; opacity: 0.7;">竖屏</div>
                    </div>
                    <div class="size-option" data-value="1:1">
                        <div style="font-size: 24px; margin-bottom: 5px;">⬜</div>
                        <div>1:1</div>
                        <div style="font-size: 12px; opacity: 0.7;">正方形</div>
                    </div>
                    <div class="size-option" data-value="4:3">
                        <div style="font-size: 24px; margin-bottom: 5px;">🖼️</div>
                        <div>4:3</div>
                        <div style="font-size: 12px; opacity: 0.7;">标准</div>
                    </div>
                    <div class="size-option" data-value="3:4">
                        <div style="font-size: 24px; margin-bottom: 5px;">📕</div>
                        <div>3:4</div>
                        <div style="font-size: 12px; opacity: 0.7;">纵向</div>
                    </div>
                    <div class="size-option" data-value="3:2">
                        <div style="font-size: 24px; margin-bottom: 5px;">🎬</div>
                        <div>3:2</div>
                        <div style="font-size: 12px; opacity: 0.7;">电影</div>
                    </div>
                    <div class="size-option" data-value="2:3">
                        <div style="font-size: 24px; margin-bottom: 5px;">📜</div>
                        <div>2:3</div>
                        <div style="font-size: 12px; opacity: 0.7;">海报</div>
                    </div>
                    <div class="size-option" data-value="2:1">
                        <div style="font-size: 24px; margin-bottom: 5px;">🌅</div>
                        <div>2:1</div>
                        <div style="font-size: 12px; opacity: 0.7;">全景</div>
                    </div>
                    <div class="size-option" data-value="1:2">
                        <div style="font-size: 24px; margin-bottom: 5px;">🏙️</div>
                        <div>1:2</div>
                        <div style="font-size: 12px; opacity: 0.7;">长屏</div>
                    </div>
                    <div class="size-option" data-value="custom">
                        <div style="font-size: 24px; margin-bottom: 5px;">⚙️</div>
                        <div>自定义</div>
                        <div style="font-size: 12px; opacity: 0.7;">自由设置</div>
                    </div>
                </div>
                
                <div class="custom-size-input" id="customSizeInput">
                    <input type="number" id="customWidth" placeholder="宽度 (376-1536)" min="376" max="1536" value="1024">
                    <input type="number" id="customHeight" placeholder="高度 (376-1536)" min="376" max="1536" value="768">
                </div>
            </div>
            
            <!-- 错误提示 -->
            <div id="errorBox" class="error-box" style="display: none;"></div>
            
            <!-- 生成按钮 -->
            <button id="generateBtn" class="generate-btn" onclick="startGeneration()">
                ✨ 开始生成图片
            </button>
            
            <!-- 结果展示 -->
            <div id="resultSection" class="result-section">
                <!-- 状态显示 -->
                <div id="statusBox" class="status-box">
                    <div class="status-text" id="statusText">
                        <span class="loading-spinner"></span>正在准备中...
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-text" id="progressText">进度：0%</div>
                </div>
                
                <!-- 图片展示 -->
                <div id="imageResult" class="image-result" style="display: none;">
                    <img id="generatedImage" src="" alt="Generated Image">
                    <br>
                    <a id="downloadLink" href="" download class="download-btn">⬇️ 下载图片</a>
                    <br>
                    <button onclick="resetForm()" class="back-btn">🔄 重新生成</button>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="/" class="back-btn">← 返回首页</a>
            </div>
        </div>
    </div>

    <!-- 引入工具类 -->
    <script src="/js/evo-link-image.js"></script>
    
    <script>
        let generator = null;
        let currentSize = "16:9";

        // 更新字数显示
        function updateCharacterCount(textareaId, countId) {
            const textarea = document.getElementById(textareaId);
            const countDiv = document.getElementById(countId);
            if (textarea && countDiv) {
                const length = textarea.value.length;
                countDiv.textContent = length + '/2000';
                if (length > 2000) {
                    countDiv.style.color = '#dc3545';
                    countDiv.style.fontWeight = 'bold';
                } else if (length > 1800) {
                    countDiv.style.color = '#ffc107';
                    countDiv.style.fontWeight = 'bold';
                } else {
                    countDiv.style.color = '#666';
                    countDiv.style.fontWeight = 'normal';
                }
            }
        }
        
        // 尺寸选择逻辑
        document.getElementById('sizeSelector').addEventListener('click', function(e) {
            const option = e.target.closest('.size-option');
            if (!option) return;
            
            // 移除所有选中状态
            document.querySelectorAll('.size-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // 添加选中状态
            option.classList.add('selected');
            currentSize = option.dataset.value;
            
            // 显示/隐藏自定义输入
            const customInput = document.getElementById('customSizeInput');
            if (currentSize === 'custom') {
                customInput.style.display = 'grid';
            } else {
                customInput.style.display = 'none';
            }
        });

        // 页面加载时初始化字数显示
        document.addEventListener('DOMContentLoaded', function() {
            updateCharacterCount('prompt', 'promptCount');
        });

        // 开始生成
        async function startGeneration() {
            const prompt = document.getElementById('prompt').value.trim();
            
            if (!prompt) {
                showError('请输入图片描述！');
                return;
            }
            
            // 获取尺寸
            let size = currentSize;
            if (currentSize === 'custom') {
                const width = parseInt(document.getElementById('customWidth').value);
                const height = parseInt(document.getElementById('customHeight').value);
                
                if (!width || !height || width < 376 || width > 1536 || height < 376 || height > 1536) {
                    showError('自定义尺寸必须在 376-1536 之间！');
                    return;
                }
                
                size = `${width}x${height}`;
            }
            
            // 重置界面
            hideError();
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('imageResult').style.display = 'none';
            document.getElementById('statusBox').style.display = 'block';
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>正在生成中...';
            
            // 创建生成器实例
            generator = new EvoLinkImageGenerator({
                onProgress: (progress, status) => {
                    updateStatus(status, progress);
                },
                onComplete: (imageUrl) => {
                    showImage(imageUrl);
                    btn.disabled = false;
                    btn.innerHTML = '✨ 开始生成图片';
                },
                onError: (error) => {
                    showError(error.message);
                    btn.disabled = false;
                    btn.innerHTML = '✨ 开始生成图片';
                },
                pollInterval: 5000,
                timeout: 300000
            });
            
            // 开始生成
            await generator.generate(prompt, size);
        }
        
        // 更新状态
        function updateStatus(status, progress) {
            const statusMap = {
                'pending': '📝 准备中...',
                'processing': '🎨 绘制中...',
                'completed': '✅ 完成!'
            };
            
            document.getElementById('statusText').innerHTML = statusMap[status] || status;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = `进度：${progress}%`;
        }
        
        // 显示图片
        function showImage(imageUrl) {
            document.getElementById('statusBox').style.display = 'none';
            document.getElementById('imageResult').style.display = 'block';
            document.getElementById('generatedImage').src = imageUrl;
            document.getElementById('downloadLink').href = imageUrl;
        }
        
        // 显示错误
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'block';
            errorBox.textContent = '❌ ' + message;
            
            setTimeout(() => {
                errorBox.style.display = 'none';
            }, 5000);
        }
        
        // 隐藏错误
        function hideError() {
            document.getElementById('errorBox').style.display = 'none';
        }
        
        // 重置表单
        function resetForm() {
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('prompt').value = '';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').textContent = '进度：0%';
        }
    </script>
</body>
</html>
