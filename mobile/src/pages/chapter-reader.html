<div class="page-enter h-screen flex flex-col bg-white">
  <div id="reader-header" class="flex items-center gap-3 px-4 py-3 border-b border-gray-100 bg-white/95 backdrop-blur transition-transform duration-300">
    <button onclick="goBack()" class="p-2 -ml-2">
      <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 id="header-title" class="text-base font-medium text-gray-700 truncate flex-1">章节标题</h1>
  </div>

  <div id="reader-scroll" class="flex-1 overflow-y-auto hide-scrollbar relative">
    <div id="reader-content" class="reader-container">
      <div id="chapters-container">
        <!-- 章节内容将动态插入这里 -->
      </div>
      
      <div id="loading-more" class="hidden py-8 text-center">
        <div class="loading-spinner mx-auto"></div>
        <p class="text-sm text-gray-400 mt-2">加载下一章...</p>
      </div>
      
      <div id="chapter-end" class="chapter-end hidden">
        <p>— 全文完 —</p>
      </div>
    </div>
  </div>

  <div id="progress-bar" class="progress-bar" style="width: 0%"></div>

  <button id="back-to-top" class="back-to-top" onclick="scrollToTop()">
    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
    </svg>
  </button>

  <div id="reader-controls" class="reader-controls" onclick="hideControls(event)">
    <div class="controls-panel" onclick="event.stopPropagation()">
      <div class="control-row">
        <span>目录</span>
        <button onclick="showToc()" class="px-4 py-2 bg-gray-100 rounded-lg text-sm">查看目录</button>
      </div>
      
      <div class="control-row">
        <button onclick="loadPrevChapter()" class="px-4 py-2 bg-gray-100 rounded-lg text-sm">← 上一章</button>
        <button onclick="loadNextChapter()" class="px-4 py-2 bg-gray-100 rounded-lg text-sm">下一章 →</button>
      </div>
      
      <div class="control-row">
        <span>字号</span>
        <div class="flex items-center gap-2">
          <button onclick="changeFontSize(-1)" class="font-size-btn">A-</button>
          <span id="font-size-display" class="w-8 text-center">18</span>
          <button onclick="changeFontSize(1)" class="font-size-btn">A+</button>
        </div>
      </div>
      
      <div class="control-row">
        <span>主题</span>
        <div class="theme-toggle">
          <button onclick="setTheme('light')" id="theme-light" class="theme-btn active">☀️ 日间</button>
          <button onclick="setTheme('dark')" id="theme-dark" class="theme-btn">🌙 夜间</button>
        </div>
      </div>
      
      <div class="control-row">
        <span>行距</span>
        <div class="line-height-options">
          <button onclick="setLineHeight('compact')" id="lh-compact" class="line-height-btn">紧凑</button>
          <button onclick="setLineHeight('comfortable')" id="lh-comfortable" class="line-height-btn active">舒适</button>
          <button onclick="setLineHeight('relaxed')" id="lh-relaxed" class="line-height-btn">宽松</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 目录抽屉 -->
<div id="toc-drawer" class="hidden fixed inset-0 bg-black/50 z-50">
  <div class="absolute right-0 top-0 bottom-0 w-4/5 max-w-sm bg-white shadow-xl flex flex-col">
    <div class="flex justify-between items-center p-4 border-b">
      <h3 class="text-lg font-semibold">目录</h3>
      <button onclick="closeToc()" class="p-2">
        <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="toc-list" class="flex-1 overflow-y-auto p-4">
      加载中...
    </div>
  </div>
</div>

<script type="module">
  import { getChapter, getChapters } from '../js/api-client.js';
  import { getReaderSettings, saveReaderSettings, applyReaderSettings, saveReadingProgress, calculateProgress } from '../js/reader.js';
  import { navigate } from '../js/router.js';
  
  window.router = { navigate };
  
  const params = window.currentRouteParams || {};
  const novelId = params.novelId || window.location.hash.split('/')[2];
  const chapterId = params.chapterId || window.location.hash.split('/')[3];
  
  let chapters = [];
  let currentChapterIndex = -1;
  let settings = getReaderSettings();
  let progressSaveTimer = null;
  let isLoadingNext = false;
  let loadedChapterIds = new Set();
  
  const readerContent = document.getElementById('reader-content');
  const readerScroll = document.getElementById('reader-scroll');
  const chaptersContainer = document.getElementById('chapters-container');
  
  // 简单的 Markdown 解析器
  function parseMarkdown(text) {
    if (!text) return '';
    
    return text
      // 转义 HTML
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      // 标题
      .replace(/^#{6}\s+(.+)$/gm, '<h6>$1</h6>')
      .replace(/^#{5}\s+(.+)$/gm, '<h5>$1</h5>')
      .replace(/^#{4}\s+(.+)$/gm, '<h4>$1</h4>')
      .replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>')
      .replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>')
      .replace(/^#{1}\s+(.+)$/gm, '<h1>$1</h1>')
      // 粗体
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/__(.+?)__/g, '<strong>$1</strong>')
      // 斜体
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/_(.+?)_/g, '<em>$1</em>')
      // 删除线
      .replace(/~~(.+?)~~/g, '<del>$1</del>')
      // 引用
      .replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>')
      // 代码块
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      // 行内代码
      .replace(/`(.+?)`/g, '<code>$1</code>')
      // 链接
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
      // 图片
      .replace(/!\[(.*?)\]\((.+?)\)/g, '<img src="$2" alt="$1" class="max-w-full my-4">')
      // 水平线
      .replace(/^---+$/gm, '<hr>')
      // 无序列表
      .replace(/^[-*+]\s+(.+)$/gm, '<li>$1</li>')
      // 有序列表
      .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
      // 段落（处理换行）
      .split('\n\n')
      .map(para => {
        para = para.trim();
        if (!para) return '';
        // 如果已经是HTML标签，不包装
        if (para.startsWith('<') && !para.startsWith('<li>')) return para;
        // 处理多个<br>
        if (para.includes('<')) return para;
        return `<p>${para}</p>`;
      })
      .join('\n')
      // 处理列表
      .replace(/(<li>.+<\/li>\n?)+/g, match => `<ul>${match}</ul>`)
      // 处理换行
      .replace(/\n/g, '<br>');
  }
  
  async function loadChapter(novelId, chId, append = false) {
    try {
      if (loadedChapterIds.has(Number(chId))) return;
      
      if (!append) {
        chaptersContainer.innerHTML = '<div class="flex justify-center py-12"><div class="loading-spinner"></div></div>';
      }
      
      const chapterDetail = await getChapter(novelId, chId);
      const chapter = chapterDetail.chapter || chapterDetail;
      
      loadedChapterIds.add(Number(chId));
      
      if (!append) {
        chaptersContainer.innerHTML = '';
        document.getElementById('chapter-end').classList.add('hidden');
      }
      
      // 创建章节元素
      const chapterEl = document.createElement('div');
      chapterEl.className = 'chapter-section mb-8';
      chapterEl.dataset.chapterId = chId;
      
      // 解析 Markdown 内容
      const markdownContent = parseMarkdown(chapter.content || '暂无内容');
      
      chapterEl.innerHTML = `
        <div class="chapter-title">${chapter.title || '无标题'}</div>
        <div class="chapter-content">${markdownContent}</div>
        <div class="text-center text-gray-400 py-4 text-sm">— 本章完 —</div>
      `;
      
      chaptersContainer.appendChild(chapterEl);
      
      if (!append) {
        document.getElementById('header-title').textContent = chapter.title || '阅读中';
        
        if (!chapters.length) {
          chapters = await getChapters(novelId);
        }
        currentChapterIndex = chapters.findIndex(c => c.id == chId);
        
        readerScroll.scrollTop = 0;
        updateProgress();
        saveReadingProgress(novelId, chId, chapter.title, 0);
      }
      
      // 检查是否还有下一章
      const hasNext = currentChapterIndex < chapters.length - 1;
      if (!hasNext && append) {
        document.getElementById('chapter-end').classList.remove('hidden');
      }
      
    } catch (error) {
      console.error('Failed to load chapter:', error);
      if (!append) {
        chaptersContainer.innerHTML = `<div class="text-center py-12 text-red-400">加载失败: ${error.message}</div>`;
      }
    }
  }
  
  async function loadNextChapter() {
    if (isLoadingNext) return;
    
    if (currentChapterIndex < chapters.length - 1) {
      isLoadingNext = true;
      document.getElementById('loading-more').classList.remove('hidden');
      
      const next = chapters[currentChapterIndex + 1];
      currentChapterIndex++;
      
      await loadChapter(novelId, next.id, true);
      
      document.getElementById('loading-more').classList.add('hidden');
      isLoadingNext = false;
    } else {
      document.getElementById('chapter-end').classList.remove('hidden');
    }
  }
  
  function updateProgress() {
    const progress = calculateProgress(readerScroll);
    document.getElementById('progress-bar').style.width = `${progress}%`;
    
    if (progressSaveTimer) clearTimeout(progressSaveTimer);
    progressSaveTimer = setTimeout(() => {
      const chapter = chapters[currentChapterIndex];
      if (chapter) {
        saveReadingProgress(novelId, chapter.id, chapter.title, progress);
      }
    }, 1000);
  }
  
  function updateSettingsUI() {
    document.getElementById('font-size-display').textContent = settings.fontSize;
    
    document.getElementById('theme-light').classList.toggle('active', settings.theme === 'light');
    document.getElementById('theme-dark').classList.toggle('active', settings.theme === 'dark');
    
    ['compact', 'comfortable', 'relaxed'].forEach(lh => {
      document.getElementById(`lh-${lh}`).classList.toggle('active', settings.lineHeight === lh);
    });
  }
  
  // 滚动事件 - 检测是否接近底部
  readerScroll.addEventListener('scroll', () => {
    updateProgress();
    
    // 显示/隐藏回到顶部
    const backToTop = document.getElementById('back-to-top');
    if (readerScroll.scrollTop > 300) {
      backToTop.classList.add('show');
    } else {
      backToTop.classList.remove('show');
    }
    
    // 检测是否接近底部，自动加载下一章
    const scrollHeight = readerScroll.scrollHeight;
    const scrollTop = readerScroll.scrollTop;
    const clientHeight = readerScroll.clientHeight;
    
    if (scrollHeight - scrollTop - clientHeight < 200 && !isLoadingNext) {
      const hasNext = currentChapterIndex < chapters.length - 1;
      if (hasNext) {
        loadNextChapter();
      }
    }
  });
  
  // 点击屏幕中央唤出控制菜单
  readerScroll.addEventListener('click', (event) => {
    const screenWidth = window.innerWidth;
    const tapX = event.clientX;
    
    if (tapX > screenWidth * 0.3 && tapX < screenWidth * 0.7) {
      document.getElementById('reader-controls').classList.add('show');
    }
  });
  
  window.hideControls = (event) => {
    if (event.target === event.currentTarget) {
      document.getElementById('reader-controls').classList.remove('show');
    }
  };
  
  window.changeFontSize = (delta) => {
    settings.fontSize = Math.max(12, Math.min(32, settings.fontSize + delta));
    saveReaderSettings(settings);
    applyReaderSettings(readerContent);
    updateSettingsUI();
  };
  
  window.setTheme = (theme) => {
    settings.theme = theme;
    saveReaderSettings(settings);
    applyReaderSettings(readerContent);
    updateSettingsUI();
  };
  
  window.setLineHeight = (height) => {
    settings.lineHeight = height;
    saveReaderSettings(settings);
    applyReaderSettings(readerContent);
    updateSettingsUI();
  };
  
  window.loadPrevChapter = () => {
    if (currentChapterIndex > 0) {
      const prev = chapters[currentChapterIndex - 1];
      window.router.navigate(`/chapter/${novelId}/${prev.id}`, { novelId, chapterId: prev.id });
    }
  };
  
  window.showToc = () => {
    hideControls({ target: document.getElementById('reader-controls') });
    document.getElementById('toc-drawer').classList.remove('hidden');
    
    const tocList = document.getElementById('toc-list');
    tocList.innerHTML = chapters.map((ch, idx) => `
      <div class="py-3 px-2 ${idx === currentChapterIndex ? 'text-dream-purple font-medium bg-dream-pink/30 rounded-lg' : 'text-gray-700'}"
           onclick="jumpToChapter(${ch.id})">
        第${idx + 1}章 ${ch.title}
      </div>
    `).join('');
  };
  
  window.closeToc = () => {
    document.getElementById('toc-drawer').classList.add('hidden');
  };
  
  window.jumpToChapter = (chId) => {
    closeToc();
    window.router.navigate(`/chapter/${novelId}/${chId}`, { novelId, chapterId: chId });
  };
  
  window.scrollToTop = () => {
    readerScroll.scrollTo({ top: 0, behavior: 'smooth' });
  };
  
  window.goBack = () => {
    history.back();
  };
  
  document.getElementById('toc-drawer').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeToc();
  });
  
  // 应用阅读设置
  applyReaderSettings(readerContent);
  updateSettingsUI();
  
  // 加载章节
  loadChapter(novelId, chapterId);
</script>
