<div class="page-enter">
  <div class="px-4 py-3 border-b border-gray-100 bg-white/95 backdrop-blur flex justify-between items-center">
    <h1 class="text-lg font-semibold text-gray-800">梦境画廊</h1>
    <button onclick="alert('筛选功能开发中')" class="text-sm text-gray-500">
      筛选 ▼
    </button>
  </div>

  <div id="gallery-grid" class="p-4 grid grid-cols-2 gap-3">
    <div class="col-span-2 flex justify-center py-8">
      <div class="loading-spinner"></div>
    </div>
  </div>
</div>

<div id="image-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
  <button onclick="closeImageModal()" class="absolute top-4 right-4 p-2 text-white/80">
    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
  <img id="preview-image" src="" alt="" class="max-w-[95%] max-h-[90vh] object-contain">
</div>

<script type="module">
  import { getImageHistory } from '../js/api-client.js';
  
  async function loadGallery() {
    try {
      const history = await getImageHistory();
      const container = document.getElementById('gallery-grid');
      
      if (!history || history.length === 0) {
        container.innerHTML = '<div class="col-span-2 text-center py-8 text-gray-400">暂无图片</div>';
        return;
      }
      
      const uniqueImages = [...new Map(history.map(h => [h.imageUrl, h])).values()]
        .sort((a, b) => new Date(b.createTime || b.createdAt) - new Date(a.createTime || a.createdAt));
      
      container.innerHTML = uniqueImages.map(item => `
        <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden cursor-pointer active:opacity-80"
             onclick="openImageModal('${item.imageUrl}')">
          <img src="${item.imageUrl}" alt="" class="w-full h-full object-cover" loading="lazy">
        </div>
      `).join('');
      
    } catch (error) {
      console.error('Failed to load gallery:', error);
      document.getElementById('gallery-grid').innerHTML = 
        `<div class="col-span-2 text-center py-8 text-red-400">加载失败: ${error.message}</div>`;
    }
  }
  
  window.openImageModal = (url) => {
    const modal = document.getElementById('image-modal');
    document.getElementById('preview-image').src = url;
    modal.classList.remove('hidden');
  };
  
  window.closeImageModal = () => {
    document.getElementById('image-modal').classList.add('hidden');
  };
  
  loadGallery();
</script>
